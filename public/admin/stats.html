<title>MaQuickPage · Suivi des maquettes</title>
<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;padding-bottom:40px;}
  header{position:sticky;top:0;z-index:20;}
  .topbar{background:#1a1a1a;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:14px 0;}
  .topbar-inner{max-width:1100px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:500;font-size:1.3rem;color:#c9a96e;letter-spacing:-.01em;}
  .spacer{flex:1;}
  .updated{font-size:12px;color:rgba(255,255,255,.6);}
  .lang-switcher{display:inline-flex;gap:4px;}
  .lang-btn{border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.85);padding:5px 9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
  .lang-btn.active{background:#c9a96e;color:#1a1a1a;border-color:#c9a96e;}
  .hbtn{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .hbtn:hover{background:rgba(255,255,255,.12);}
  .hbtn.gold{background:#c9a96e;color:#1a1a1a;border-color:#c9a96e;}
  .controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 0;}
  .controls-inner{max-width:1100px;margin:0 auto;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .controls input[type=search]{flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;outline:none;}
  .controls input:focus{border-color:var(--gold);}
  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--cool);cursor:pointer;user-select:none;}
  main{padding:16px;max-width:1100px;margin:0 auto;}
  .msg{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
  .msg a{color:var(--blue);font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
  .kpi .v{font-size:26px;font-weight:800;line-height:1;}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .kpi.hot .v{color:var(--hot);}.kpi.ok .v{color:var(--ok);}.kpi.gold .v{color:var(--gold-d);}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:24px 0 10px;}
  .funnel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .frow{display:flex;align-items:center;gap:12px;margin-bottom:9px;}.frow:last-child{margin-bottom:0;}
  .fname{width:160px;flex-shrink:0;font-size:13.5px;font-weight:600;}
  .fbar-wrap{flex:1;background:#efeada;border-radius:8px;overflow:hidden;height:26px;position:relative;}
  .fbar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-d));border-radius:8px;min-width:2px;}
  .fval{position:absolute;right:10px;top:0;height:26px;display:flex;align-items:center;font-size:12.5px;font-weight:700;}
  .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:11px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
  th.sortable:hover{color:var(--ink);}
  th .arr{opacity:.5;font-size:10px;margin-left:3px;}
  td{padding:11px 12px;border-bottom:1px solid #f0ece1;vertical-align:middle;}
  tr.row{cursor:pointer;}
  tr.row:hover td{background:#faf8f2;}
  .salon{font-weight:700;}.loc{font-size:12px;color:var(--muted);}.email{font-size:12.5px;color:var(--cool);}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .b-client{background:#dcfce7;color:#14532d;}.b-hot{background:#fde2e0;color:#9b2c22;}.b-warm{background:#fef3c7;color:#92400e;}.b-tiede{background:#e0e7ff;color:#3730a3;}.b-cold{background:#eef0f2;color:#5b6470;}
  /* Tags comportementaux (signaux parallèles, plus écrasés par l'étape max) */
  .tags{display:flex;flex-wrap:wrap;gap:4px;}
  .tag{display:inline-block;padding:2px 8px;border-radius:7px;font-size:11.5px;font-weight:600;background:#eef0f2;color:#5b6470;white-space:nowrap;}
  .tag.t-hot{background:#fde2e0;color:#9b2c22;}
  .tag.t-warm{background:#fef3c7;color:#92400e;}
  /* Barre de filtres par statut (= liste d'appels en 1 clic) */
  .filterbar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px;}
  .fbtn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);background:#fff;color:var(--ink);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;}
  .fbtn:hover{border-color:var(--gold);}
  .fbtn.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .fbtn .c{font-variant-numeric:tabular-nums;font-weight:700;opacity:.7;}
  .fbtn.on .c{opacity:.95;}
  .fdot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .when{font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .num{text-align:center;font-variant-numeric:tabular-nums;}
  .tlink{color:var(--blue);text-decoration:none;font-weight:600;font-size:13px;}
  .scrollbar{height:6px;background:#efeada;border-radius:4px;width:54px;overflow:hidden;display:inline-block;vertical-align:middle;}
  .scrollbar>i{display:block;height:100%;background:var(--gold-d);}
  .detail td{background:#faf8f2;border-bottom:1px solid #f0ece1;padding:14px 16px;}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .dlabel{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .devt{font-size:13px;margin:2px 0;}
  .devt b{font-weight:700;}
  .dmono{font-size:12px;color:var(--cool);word-break:break-all;font-family:ui-monospace,Menlo,monospace;}
  .dev{border:1px solid var(--border);border-radius:8px;margin:5px 0;background:#fff;}
  .dev>summary{list-style:none;cursor:pointer;padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:13px;}
  .dev>summary::-webkit-details-marker{display:none;}
  .dev[open]>summary{border-bottom:1px solid var(--border);}
  .dev .ico{font-size:17px;line-height:1;}
  .dev .dlab{font-weight:700;}
  .dev .dtime{color:var(--ink);}
  .dev .dcnt{color:var(--muted);font-size:12px;margin-left:auto;white-space:nowrap;}
  .dev-detail{padding:9px 11px;}
  .dtimes{display:flex;flex-wrap:wrap;gap:5px;margin:3px 0 9px;}
  .dtimes span{background:#efeada;border-radius:5px;padding:2px 7px;font-size:11.5px;font-variant-numeric:tabular-nums;}
  .caret{display:inline-block;width:14px;color:var(--muted);font-size:11px;}
  @media(max-width:680px){.fname{width:120px;font-size:12px;}td,th{padding:9px 8px;}.hide-sm{display:none;}}
  /* ===== Modale photos salon ===== */
  #pm-wrap{position:fixed;inset:0;background:rgba(10,10,10,.62);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:24px 12px;overflow-y:auto;}
  #pm-wrap.on{display:flex;}
  #pm{background:#fff;border-radius:16px;max-width:980px;width:100%;box-shadow:0 16px 60px rgba(0,0,0,.35);overflow:hidden;}
  #pm-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:2;}
  #pm-head .nm{font-weight:800;font-size:16px;}
  #pm-head .sub{font-size:12.5px;color:var(--muted);}
  #pm-close{margin-left:auto;border:none;background:#f0ece1;border-radius:8px;font-size:16px;cursor:pointer;padding:6px 11px;}
  #pm-body{padding:16px 18px;}
  .pm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .pm-it{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:#faf8f2;}
  .pm-im{position:relative;aspect-ratio:4/3;cursor:zoom-in;background:#eee;}
  .pm-im img{width:100%;height:100%;object-fit:cover;display:block;}
  .pm-im.ai{outline:3px solid var(--gold);outline-offset:-3px;}
  .pm-tag{position:absolute;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px;color:#fff;}
  .pm-tag.star{top:5px;left:5px;background:rgba(168,132,47,.95);}
  .pm-tag.ld{bottom:5px;left:5px;background:rgba(192,57,43,.88);}
  .pm-tag.cur{top:5px;right:5px;background:rgba(19,138,54,.92);}
  .pm-acts{display:flex;align-items:center;gap:6px;padding:7px 8px;}
  .pm-hero-btn{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:7px;padding:5px 8px;font-size:12px;font-weight:700;cursor:pointer;}
  .pm-hero-btn:hover{border-color:var(--gold);background:#fdf3dc;}
  .pm-gal{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--cool);cursor:pointer;user-select:none;}
  #pm-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 18px;border-top:1px solid var(--border);position:sticky;bottom:0;background:#fff;}
  #pm-foot select{padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;}
  .pm-btn{border:1.5px solid var(--border);background:#fff;border-radius:9px;padding:8px 14px;font-size:13.5px;font-weight:700;cursor:pointer;}
  .pm-btn.gold{background:var(--gold);border-color:var(--gold);color:#fff;}
  .pm-btn.danger{color:var(--hot);border-color:#e3b4ae;}
  .pm-btn.danger:hover{background:#fdecea;border-color:var(--hot);}
  .pm-btn:disabled{opacity:.45;cursor:not-allowed;}
  #pm-status{font-size:12.5px;color:var(--muted);}
  #pm-zoom{position:fixed;inset:0;background:rgba(10,10,10,.9);display:none;align-items:center;justify-content:center;z-index:110;cursor:zoom-out;padding:18px;}
  #pm-zoom.on{display:flex;}
  #pm-zoom img{max-width:96vw;max-height:92vh;border-radius:8px;}
  #st-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:600;transition:transform .25s;z-index:130;max-width:90vw;}
  #st-toast.on{transform:translateX(-50%) translateY(0);}
  .stats-toolbar header{position:static;}
</style>

<!-- Modale photos salon (héro + galerie depuis les photos Google scrapées) -->
<div id="pm-wrap">
  <div id="pm">
    <div id="pm-head">
      <div><div class="nm" id="pm-nm">…</div><div class="sub" id="pm-sub"></div></div>
      <button id="pm-close">✕ Fermer</button>
    </div>
    <div id="pm-body"><div class="msg">Chargement des photos…</div></div>
    <div id="pm-foot">
      <select id="pm-pos"><option value="centre">Cadrage héro : centre</option><option value="haut">Cadrage héro : haut</option><option value="bas">Cadrage héro : bas</option></select>
      <button class="pm-btn" id="pm-ai">🤖 Avis de l'IA</button>
      <button class="pm-btn danger" id="pm-reset" title="Remet le héro et la galerie aux images du mode démo (retire les photos Google appliquées)">↺ Réinitialiser</button>
      <span class="spacer" style="flex:1"></span>
      <span id="pm-status"></span>
      <button class="pm-btn" id="pm-gal-replace" disabled title="Ne garde que les photos cochées (retire les photos du mode démo)">Remplacer la galerie (0)</button>
      <button class="pm-btn gold" id="pm-gal-add" disabled title="Ajoute les photos cochées en tête de la galerie actuelle (garde les photos déjà en place)">＋ Ajouter à la galerie (0)</button>
    </div>
  </div>
</div>
<div id="pm-zoom" onclick="this.classList.remove('on')"><img id="pm-zoom-img" src="" alt=""></div>

  var STAGE={preview_ouvert:1,pricing_ouvert:3,etape_domaine:4,etape_email:5,domaine_perso:6,editeur_ouvert:7,editeur_modifie:8,cgv_accepte:9,paiement_initie:10};

  // Chaud = a atteint le checkout (Email 3/3 / CGV / paiement) sans convertir.

  var BOT_RE=/bot|crawl|spider|slurp|curl|wget|python|http-client|headless|phantom|preview|scan|proofpoint|mimecast|barracuda|safelinks|googleimageproxy|facebookexternalhit|whatsapp|bingpreview|yandex|ahrefs|semrush|monitor/i;

  function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    var rows=[],row=[],cur='',q=false,i=0,c;
    for(;i<text.length;i++){c=text[i];
      if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
      else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c==='\r'){}else cur+=c;}}
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    if(!rows.length)return[];
    var head=rows[0],out=[];
    for(var r=1;r<rows.length;r++){if(rows[r].length===1&&rows[r][0]==='')continue;var o={};for(var k=0;k<head.length;k++)o[head[k]]=rows[r][k]||'';out.push(o);}
    return out;
  }
  function aggregate(events){
    var bySlug={};

      var s=bySlug[slug]||(bySlug[slug]={slug:slug,salon:e.salon||slug,ville:e.ville||'',email:e.email||'',status:e.subscription_status||'',plan:'',token:'',heat:0,last:'',count:0,scroll:0,events:{},devices:{},real:false});
      if(e.salon&&e.salon.trim())s.real=true;
      if(e.salon)s.salon=e.salon;if(e.ville)s.ville=e.ville;if(e.email)s.email=e.email;if(e.subscription_status)s.status=e.subscription_status;
      if(e.edit_token&&!s.token)s.token=e.edit_token;
      var st=STAGE[e.event]||0;if(st>s.heat)s.heat=st;s.count++;
      var ev=s.events[e.event]||(s.events[e.event]={n:0,last:''});ev.n++;if(e.ts>ev.last)ev.last=e.ts;
      if(e.event==='scroll_max'&&e.meta){try{var m=JSON.parse(e.meta);if(m.pct>s.scroll)s.scroll=m.pct;}catch(x){}}
      if((e.event==='etape_domaine'||e.event==='paiement_initie')&&e.meta&&!s.plan){try{var mp=JSON.parse(e.meta);if(mp.plan)s.plan=mp.plan;}catch(x){}}
      var uak=e.user_agent||'(inconnu)';
      var dv=s.devices[uak]||(s.devices[uak]={ua:uak,n:0,last:'',ips:{},times:[]});
      dv.n++;if(e.ts>dv.last)dv.last=e.ts;if(e.ts)dv.times.push(e.ts);if(e.ip)dv.ips[e.ip]=1;
      if(e.ts>s.last)s.last=e.ts;});
    // "A scrollé" (niveau 2) seulement si scroll réel >0% (un scroll_max à 0%
    // = vu sans scroller, ne doit pas surclasser un simple preview).
    // .filter(real) écarte les slugs sans salon réel = scanners (phpinfo.php, .env…).
    return Object.keys(bySlug).map(function(k){var s=bySlug[k];if(s.scroll>0&&s.heat<2)s.heat=2;s.skey=statusOf(s);return s;}).filter(function(s){return s.real;});
  }

  // Identifie l'appareil à partir du user_agent → icône + libellé lisible.
  function parseUA(ua){
    if(!ua||ua==='(inconnu)')return{icon:'❓',label:'Inconnu'};
    var u=ua.toLowerCase(),os,icon,br='';
    if(/iphone/.test(u)){os='iPhone';icon='📱';}
    else if(/ipad/.test(u)){os='iPad';icon='📱';}
    else if(/android/.test(u)){os='Android';icon='📱';}
    else if(/macintosh|mac os/.test(u)){os='Mac';icon='💻';}
    else if(/windows/.test(u)){os='Windows';icon='🖥️';}
    else if(/linux/.test(u)){os='Linux';icon='🖥️';}
    else if(/bot|crawl|spider|preview|scan|proofpoint|mimecast|barracuda|safelinks/.test(u)){os='Bot / scanner';icon='🤖';}
    else{os='Autre';icon='🖥️';}
    if(/edg\//.test(u))br='Edge';else if(/crios|chrome/.test(u))br='Chrome';else if(/fxios|firefox/.test(u))br='Firefox';else if(/safari/.test(u))br='Safari';
    return{icon:icon,label:os+(br?' · '+br:'')};
  }
  function detailRow(s){
    var evts=Object.keys(s.events).sort(function(a,b){return(STAGE[b]||0)-(STAGE[a]||0);}).map(function(k){

    var devs=Object.keys(s.devices).map(function(k){return s.devices[k];})
      .sort(function(a,b){return a.last<b.last?1:(a.last>b.last?-1:0);})
      .map(function(d){
        var p=parseUA(d.ua);
        var seen={},tl=[];
        d.times.forEach(function(ts){var f=fmtDate(ts);if(!seen[f]){seen[f]=1;tl.push({f:f,ts:ts});}});
        tl.sort(function(a,b){return a.ts<b.ts?1:-1;});

      +'</div></td></tr>';
  }

    var visited=salons.length;
    var pricing=salons.filter(function(s){return s.heat>=3;}).length;
    var domains=salons.filter(function(s){return s.heat>=4;}).length;
    var custom=salons.filter(function(s){return s.events['domaine_perso'];}).length;
    var edited=salons.filter(function(s){return s.events['editeur_modifie'];}).length;
    var cgv=salons.filter(function(s){return s.events['cgv_accepte'];}).length;
    var pay=salons.filter(function(s){return s.events['paiement_initie'];}).length;
    var clients=salons.filter(isClient).length;
    var totalEvents=raw.length,botEvents=raw.filter(function(e){return isBot(e.user_agent);}).length;

    html+=kpi(domains,t('k_domains'),'','gold');
    html+=kpi(custom,t('k_custom'),'','hot');
    html+=kpi(edited,t('k_edited'),'','hot');
    html+=kpi(cgv,t('k_cgv'),'','hot');
    html+=kpi(pay,t('k_pay'),'','hot');
    html+=kpi(clients,t('k_clients'),'','ok');
    html+=kpi(humanPct+'%',t('k_human'),t('k_human_sub',{n:botEvents}),'');

  // Transfert 1-clic d'un salon du Suivi vers la prospection téléphonique.
  // Le backend résout le numéro (DB puis Google Places) et évite les doublons.
  function addToCalling(slug,el){
    if(el){el._prev=el.textContent;el.textContent='⏳';}
    fetch('/admin/api/calling/add',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({slug:slug,added_from:'tracking'})})
      .then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||('http '+r.status));return j;});})
      .then(function(j){
        if(el){el.textContent='☎️';el.title='Déjà dans la prospection';}
        var p=j.prospect||{};
        var tel=p.telephone?(' · '+p.telephone):' · numéro à retrouver (bouton 🔎 dans Prospection)';
        stToast((j.already?'Déjà dans la prospection':'Ajouté à la prospection ✓')+tel);
      })
      .catch(function(e){if(el&&el._prev)el.textContent=el._prev;stToast('Erreur : '+e.message);});
  }

  function load(){
    $('updated').textContent='…';
    fetch(CSV_URL+'?t='+Date.now(),{credentials:'same-origin',cache:'no-store'}).then(function(r){
      if(r.status===401||r.status===302||r.redirected)throw new Error('auth');
      if(!r.ok)throw new Error('http '+r.status);
      return r.text();
    }).then(function(txt){
      if(/<!doctype html|<html/i.test(txt.slice(0,200)))throw new Error('auth');
      raw=parseCSV(txt);var n=new Date();
      $('updated').textContent=t('maj')+' '+n.getHours()+'h'+('0'+n.getMinutes()).slice(-2);
      render();
    }).catch(function(e){
      if(e.message==='auth')$('content').innerHTML='<div class="msg">'+t('auth')+'<br><br><a href="/admin/login">'+t('signin')+'</a></div>';
      else $('content').innerHTML='<div class="msg">'+t('err')+esc(e.message)+'</div>';
      $('updated').textContent='';
    });
  }

  // (langue gérée par admin-nav.js, partagé sur toutes les pages)
  $('refresh').onclick=load;
  $('export').onclick=function(){window.open(CSV_URL,'_blank');};
  $('q').addEventListener('input',function(){if(raw.length)render();});
  $('humansOnly').addEventListener('change',function(){if(raw.length)render();});
  $('autorefresh').addEventListener('change',function(){if(this.checked)autoTimer=setInterval(load,60000);else clearInterval(autoTimer);});
  // ===================================================================
  // Modale photos salon : héro + galerie depuis les photos Google scrapées
  // ===================================================================
  var pmState={slug:null,photos:[],sel:{},aiPick:null,heroCurrent:null};
  function stToast(m,ms){var t=$('st-toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('on');},ms||3500);}
  function pmApi(path,opts){
    return fetch(path,Object.assign({credentials:'same-origin'},opts||{})).then(function(r){
      if(r.status===401)throw new Error('Session expirée — reconnecte-toi à l\'admin.');
      return r.json().then(function(j){if(!r.ok)throw new Error(j.error||('http '+r.status));return j;});
    });
  }
  function openPhotoModal(slug,name){
    pmState={slug:slug,photos:[],sel:{},aiPick:null,heroCurrent:null};
    $('pm-nm').textContent=name||slug;
    $('pm-sub').textContent=slug;
    $('pm-status').textContent='';
    $('pm-body').innerHTML='<div class="msg">Chargement des photos…</div>';
    $('pm-wrap').classList.add('on');
    pmApi('/admin/api/picker/salon/'+encodeURIComponent(slug)+'/photos').then(function(j){
      pmState.photos=j.photos||[];pmState.aiPick=j.ai_pick;pmState.heroCurrent=j.hero_current;
      if(j.reason&&!pmState.photos.length){$('pm-body').innerHTML='<div class="msg">'+esc(j.reason)+'</div>';updateGalBtn();return;}
      renderPm();
    }).catch(function(e){$('pm-body').innerHTML='<div class="msg">Erreur : '+esc(e.message)+'</div>';});
  }
  function renderPm(){
    var ph=pmState.photos;
    if(!ph.length){$('pm-body').innerHTML='<div class="msg">Aucune photo scrapée trouvée pour ce salon.</div>';updateGalBtn();return;}
    var aiId=pmState.aiPick&&pmState.aiPick.photo_id;
    var h='<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">'+ph.length+' photo'+(ph.length>1?'s':'')+' · clic sur l\'image = zoom · « basse déf » = à éviter en héro'+(pmState.heroCurrent?' · <span style="color:var(--ok);font-weight:700">héro déjà personnalisé ✓</span>':'')+'</div>';
    h+='<div class="pm-grid">';
    ph.forEach(function(p){
      var isAi=p.photo_id===aiId;
      h+='<div class="pm-it"><div class="pm-im'+(isAi?' ai':'')+'" data-lg="'+esc(p.lg)+'">'
        +'<img loading="lazy" src="'+esc(p.th)+'" alt="">'
        +(isAi?'<span class="pm-tag star">⭐ choix IA</span>':'')
        +(p.lowdef?'<span class="pm-tag ld">basse déf</span>':'')
        +'</div><div class="pm-acts">'
        +'<button class="pm-hero-btn" data-hero="'+esc(p.photo_id)+'">Définir héro</button>'
        +'<label class="pm-gal"><input type="checkbox" data-gal="'+esc(p.photo_id)+'"'+(pmState.sel[p.photo_id]?' checked':'')+'> galerie</label>'
        +'</div></div>';
    });
    h+='</div>';
    if(pmState.aiPick&&pmState.aiPick.reasoning)h+='<div style="font-size:13px;color:var(--cool);font-style:italic;margin-top:12px">🤖 «&nbsp;'+esc(pmState.aiPick.reasoning)+'&nbsp;»</div>';
    $('pm-body').innerHTML=h;
    Array.prototype.forEach.call($('pm-body').querySelectorAll('.pm-im'),function(im){
      im.onclick=function(){$('pm-zoom-img').src=im.getAttribute('data-lg');$('pm-zoom').classList.add('on');};});
    Array.prototype.forEach.call($('pm-body').querySelectorAll('[data-hero]'),function(b){
      b.onclick=function(){
        b.disabled=true;b.textContent='Application…';
        $('pm-status').textContent='Recadrage + upload en cours…';
        pmApi('/admin/api/picker/salon/'+encodeURIComponent(pmState.slug)+'/hero',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_id:b.getAttribute('data-hero'),position:$('pm-pos').value})})
          .then(function(){stToast('Héro appliqué ✓ — la démo est à jour, screenshot en recapture');$('pm-status').textContent='Héro appliqué ✓';pmState.heroCurrent='✓';renderPm();})
          .catch(function(e){stToast('Erreur héro : '+e.message);b.disabled=false;b.textContent='Définir héro';$('pm-status').textContent='';});
      };});
    Array.prototype.forEach.call($('pm-body').querySelectorAll('[data-gal]'),function(c){
      c.onchange=function(){pmState.sel[c.getAttribute('data-gal')]=c.checked;updateGalBtn();};});
    updateGalBtn();
  }
  function selectedGal(){return Object.keys(pmState.sel).filter(function(k){return pmState.sel[k];});}
  function updateGalBtn(){
    var n=selectedGal().length;
    var addB=$('pm-gal-add'),repB=$('pm-gal-replace');
    var over=n>12;
    addB.textContent=over?('Max 12 ('+n+')'):('＋ Ajouter à la galerie ('+n+')');
    repB.textContent=over?('Max 12 ('+n+')'):('Remplacer la galerie ('+n+')');
    addB.disabled=repB.disabled=(n===0||over);
  }
  function applyGalleryMode(mode){
    var ids=selectedGal();
    if(!ids.length)return;
    var addB=$('pm-gal-add'),repB=$('pm-gal-replace');
    addB.disabled=repB.disabled=true;
    (mode==='append'?addB:repB).textContent=mode==='append'?'Ajout…':'Remplacement…';
    $('pm-status').textContent='Recadrage + upload de '+ids.length+' image(s)…';
    pmApi('/admin/api/picker/salon/'+encodeURIComponent(pmState.slug)+'/gallery',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_ids:ids,mode:mode})})
      .then(function(r){
        stToast(mode==='append'?('Galerie enrichie : +'+r.added+' photo(s) en tête · '+r.count+' au total ✓'):('Galerie remplacée ('+r.count+' image'+(r.count>1?'s':'')+') ✓'));
        $('pm-status').textContent='Galerie mise à jour ✓';pmState.sel={};renderPm();
      })
      .catch(function(e){stToast('Erreur galerie : '+e.message);$('pm-status').textContent='';updateGalBtn();});
  }
  $('pm-gal-add').onclick=function(){applyGalleryMode('append');};
  $('pm-gal-replace').onclick=function(){applyGalleryMode('replace');};
  $('pm-reset').onclick=function(){
    if(!confirm('Réinitialiser les photos de ce salon ?\n\nLe héro et la galerie repassent aux images du mode démo, et les photos Google que tu as appliquées sont retirées.\n\n(Les autres réglages du site — services, avis, contact — ne changent pas.)'))return;
    var b=$('pm-reset');b.disabled=true;b.textContent='Réinitialisation…';
    $('pm-status').textContent='Retour aux images de démo…';
    pmApi('/admin/api/picker/salon/'+encodeURIComponent(pmState.slug)+'/reset-images',{method:'POST'})
      .then(function(r){
        stToast(r.changed?'Photos réinitialisées (mode démo) ✓ — screenshot en recapture':'Déjà en mode démo, rien à réinitialiser');
        openPhotoModal(pmState.slug,$('pm-nm').textContent); // recharge l'état démo dans la modale
      })
      .catch(function(e){stToast('Erreur : '+e.message);$('pm-status').textContent='';b.disabled=false;b.textContent='↺ Réinitialiser';});
  };
  $('pm-ai').onclick=function(){
    var b=$('pm-ai');b.disabled=true;b.textContent='🤖 Analyse en cours…';
    $('pm-status').textContent='L\'IA examine les photos (~15-30 s)…';
    pmApi('/admin/api/picker/salon/'+encodeURIComponent(pmState.slug)+'/score',{method:'POST'})
      .then(function(r){
        b.disabled=false;b.textContent='🤖 Avis de l\'IA';
        var res=r.result||{};
        pmState.aiPick=res.selected_photo_id?{photo_id:res.selected_photo_id,reasoning:res.reasoning}:{photo_id:null,reasoning:res.reasoning||res.overall_assessment};
        $('pm-status').textContent=res.selected_photo_id?'⭐ L\'IA a choisi':'L\'IA : aucune photo idéale';
        renderPm();
      })
      .catch(function(e){b.disabled=false;b.textContent='🤖 Avis de l\'IA';$('pm-status').textContent='';stToast('Erreur IA : '+e.message);});
  };
  $('pm-close').onclick=function(){$('pm-wrap').classList.remove('on');};
  $('pm-wrap').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});

  applyStatic();
  load();
})();
</script>
</body>
</html>
