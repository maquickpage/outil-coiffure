<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;padding-bottom:40px;}
  header{position:sticky;top:0;z-index:20;}
  .topbar{background:#1a1a1a;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:14px 0;}
  .topbar-inner{max-width:1100px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:500;font-size:1.3rem;color:#c9a96e;letter-spacing:-.01em;}
  .spacer{flex:1;}
  .updated{font-size:12px;color:rgba(255,255,255,.6);}
  .lang-switcher{display:inline-flex;gap:4px;}
  .lang-btn{border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.85);padding:5px 9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
  .lang-btn.active{background:#c9a96e;color:#1a1a1a;border-color:#c9a96e;}
  .hbtn{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .hbtn:hover{background:rgba(255,255,255,.12);}
  .hbtn.gold{background:#c9a96e;color:#1a1a1a;border-color:#c9a96e;}
  .controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 0;}
  .controls-inner{max-width:1100px;margin:0 auto;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .controls input[type=search]{flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;outline:none;}
  .controls input:focus{border-color:var(--gold);}
  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--cool);cursor:pointer;user-select:none;}
  .ipbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:12px;padding:9px 14px;margin-bottom:16px;font-size:13px;color:var(--cool);}
  .ipbar-txt b{color:var(--ink);}
  .ipbtn{margin-left:auto;border:1.5px solid var(--border);background:#fff;color:var(--ink);padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .ipbtn:hover{border-color:var(--gold);}
  .ipbtn.on{background:#eef0f2;color:var(--cool);border-color:var(--border);}
  .ipbtn:disabled{opacity:.5;cursor:default;}
  .dflag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:6px;}
  .dflag.f-int{background:#e0e7ff;color:#3730a3;}
  .dflag.f-bot{background:#eef0f2;color:#5b6470;}
  .dev.muted{opacity:.62;}
  main{padding:16px;max-width:1100px;margin:0 auto;}
  .msg{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
  .msg a{color:var(--blue);font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
  .kpi .v{font-size:26px;font-weight:800;line-height:1;}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .kpi.hot .v{color:var(--hot);}.kpi.ok .v{color:var(--ok);}.kpi.gold .v{color:var(--gold-d);}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:24px 0 10px;}
  .funnel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .frow{display:flex;align-items:center;gap:12px;margin-bottom:9px;padding:3px 6px;margin-left:-6px;margin-right:-6px;border-radius:9px;}.frow:last-child{margin-bottom:0;}
  .frow.clickable{cursor:pointer;}
  .frow.clickable:hover{background:#faf6ec;}
  .frow.clickable:hover .fname{color:var(--gold-d);}
  .frow.on{background:#f5edd8;box-shadow:inset 0 0 0 1.5px var(--gold);}
  .frow.on .fname{color:var(--gold-d);}
  .fname{width:160px;flex-shrink:0;font-size:13.5px;font-weight:600;}
  .fbar-wrap{flex:1;background:#efeada;border-radius:8px;overflow:hidden;height:26px;position:relative;}
  .fbar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-d));border-radius:8px;min-width:2px;}
  .fval{position:absolute;right:10px;top:0;height:26px;display:flex;align-items:center;font-size:12.5px;font-weight:700;}
  .kpi.clickable{cursor:pointer;transition:box-shadow .1s,transform .1s;}
  .kpi.clickable:hover{box-shadow:0 2px 10px rgba(168,132,47,.18);transform:translateY(-1px);}
  .kpi.on{box-shadow:inset 0 0 0 2px var(--gold);}
  .funnelchip{background:var(--gold)!important;border-color:var(--gold)!important;color:#fff!important;}
  .funnelchip .fx{margin-left:2px;opacity:.9;font-weight:700;}
  .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:11px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
  th.sortable:hover{color:var(--ink);}
  th .arr{opacity:.5;font-size:10px;margin-left:3px;}
  td{padding:11px 12px;border-bottom:1px solid #f0ece1;vertical-align:middle;}
  tr.row{cursor:pointer;}
  tr.row:hover td{background:#faf8f2;}
  .salon{font-weight:700;}.loc{font-size:12px;color:var(--muted);}.email{font-size:12.5px;color:var(--cool);}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .b-client{background:#dcfce7;color:#14532d;}.b-hot{background:#fde2e0;color:#9b2c22;}.b-warm{background:#fef3c7;color:#92400e;}.b-tiede{background:#e0e7ff;color:#3730a3;}.b-cold{background:#eef0f2;color:#5b6470;}
  /* Tags comportementaux (signaux parallèles, plus écrasés par l'étape max) */
  .tags{display:flex;flex-wrap:wrap;gap:4px;}
  .tag{display:inline-block;padding:2px 8px;border-radius:7px;font-size:11.5px;font-weight:600;background:#eef0f2;color:#5b6470;white-space:nowrap;}
  .tag.t-hot{background:#fde2e0;color:#9b2c22;}
  .tag.t-warm{background:#fef3c7;color:#92400e;}
  /* Barre de filtres par statut (= liste d'appels en 1 clic) */
  .filterbar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px;}
  .fbtn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);background:#fff;color:var(--ink);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;}
  .fbtn:hover{border-color:var(--gold);}
  .fbtn.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .fbtn .c{font-variant-numeric:tabular-nums;font-weight:700;opacity:.7;}
  .fbtn.on .c{opacity:.95;}
  .fdot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .when{font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .num{text-align:center;font-variant-numeric:tabular-nums;}
  .tlink{color:var(--blue);text-decoration:none;font-weight:600;font-size:13px;}
  .scrollbar{height:6px;background:#efeada;border-radius:4px;width:54px;overflow:hidden;display:inline-block;vertical-align:middle;}
  .scrollbar>i{display:block;height:100%;background:var(--gold-d);}
  .detail td{background:#faf8f2;border-bottom:1px solid #f0ece1;padding:14px 16px;}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .dlabel{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .devt{font-size:13px;margin:2px 0;}
  .devt b{font-weight:700;}
  .dmono{font-size:12px;color:var(--cool);word-break:break-all;font-family:ui-monospace,Menlo,monospace;}
  .dev{border:1px solid var(--border);border-radius:8px;margin:5px 0;background:#fff;}
  .dev>summary{list-style:none;cursor:pointer;padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:13px;}
  .dev>summary::-webkit-details-marker{display:none;}
  .dev[open]>summary{border-bottom:1px solid var(--border);}
  .dev .ico{font-size:17px;line-height:1;}
  .dev .dlab{font-weight:700;}
  .dev .dtime{color:var(--ink);}
  .dev .dcnt{color:var(--muted);font-size:12px;margin-left:auto;white-space:nowrap;}
  .dev-detail{padding:9px 11px;}
  .dtimes{display:flex;flex-wrap:wrap;gap:5px;margin:3px 0 9px;}
  .dtimes span{background:#efeada;border-radius:5px;padding:2px 7px;font-size:11.5px;font-variant-numeric:tabular-nums;}
  .caret{display:inline-block;width:14px;color:var(--muted);font-size:11px;}
  @media(max-width:680px){.fname{width:120px;font-size:12px;}td,th{padding:9px 8px;}.hide-sm{display:none;}}
  /* (la modale photos vit désormais dans /admin/photo-modal.js, partagée avec le cockpit) */
  #st-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:600;transition:transform .25s;z-index:130;max-width:90vw;}
  #st-toast.on{transform:translateX(-50%) translateY(0);}
  .stats-toolbar header{position:static;}
</style>

  var lang=(function(){try{var s=localStorage.getItem('outil-coiffure-lang');return T[s]?s:'fr';}catch(e){return 'fr';}})();
  function t(k,p){var s=(T[lang]&&T[lang][k])||T.fr[k]||k;if(p)for(var x in p)s=s.replace('{'+x+'}',p[x]);return s;}

  function applyStatic(){

  function setLang(l){if(!T[l])return;lang=l;try{localStorage.setItem('outil-coiffure-lang',l);}catch(e){}applyStatic();if(salonsData.length)render();}

  var STAGE={preview_ouvert:1,pricing_ouvert:3,etape_domaine:4,etape_email:5,domaine_perso:6,editeur_ouvert:7,editeur_modifie:8,cgv_accepte:9,paiement_initie:10};
  var PLAN={TWO_YEAR:'9,90€ · 24 mois',ONE_YEAR:'17,90€ · 12 mois',FLEX:'29€ · sans engagement'};
  var EVENT_KEY={preview_ouvert:'e_view',scroll_max:'e_scroll',pricing_ouvert:'e_pricing',etape_domaine:'e_domains',domaine_perso:'e_custom',etape_email:'e_email',editeur_ouvert:'e_editopen',editeur_modifie:'e_editsave',cgv_accepte:'e_cgv',paiement_initie:'e_pay',demo_email_envoyee:'e_demo_mail',demo_sms_copiee:'e_demo_sms'};
  // ===== Statut commercial : un seul bucket par salon, ordonné par valeur =====
  // Remplace l'échelle 1–10 (qui mélangeait achat et édition) : ici le checkout
  // prime toujours sur l'éditeur. Les signaux parallèles passent en tags.
  var STATUS_ORDER={client:5,hot:4,engaged:3,interested:2,curious:1};
  var STATUS_BADGE={client:'b-client',hot:'b-hot',engaged:'b-warm',interested:'b-tiede',curious:'b-cold'};
  var STATUS_DOT={client:'#138a36',hot:'#c0392b',engaged:'#b8860b',interested:'#4f46e5',curious:'#9aa0a6'};
  var STATUS_KEYS=['client','hot','engaged','interested','curious'];
  // Chaud = a atteint le checkout (Email 3/3 / CGV / paiement) sans convertir.
  function statusOf(s){
    if(isClient(s))return'client';
    var e=s.events;
    if(e['etape_email']||e['cgv_accepte']||e['paiement_initie'])return'hot';
    if(e['editeur_modifie']||e['domaine_perso'])return'engaged';
    if(e['pricing_ouvert']||e['etape_prix']||e['etape_domaine']||e['editeur_ouvert'])return'interested';
    return'curious';
  }
  function statusBadge(key){return'<span class="badge '+STATUS_BADGE[key]+'">'+esc(t('stt_'+key))+'</span>';}
  // Tags = signaux PARALLÈLES uniquement (l'étape de checkout est déjà dite par
  // le badge statut → on ne la répète pas ici : plus de doublon Chaud↔Paiement).
  function tagsOf(s){
    var e=s.events,out=[];
    if(e['domaine_perso'])out.push(['tg_custom','t-warm',null]);
    if(e['editeur_modifie'])out.push(['tg_edited','t-warm',null]);
    else if(e['editeur_ouvert'])out.push(['tg_editor','',null]);
    // Partages depuis le cockpit de prospection (envoi email / SMS copié)
    if(e['demo_email_envoyee'])out.push(['tg_demo_mail','t-warm',null]);
    if(e['demo_sms_copiee'])out.push(['tg_demo_sms','',null]);
    if(s.scroll>0)out.push(['tg_scroll','',{n:s.scroll}]);
    // Appareils prospect distincts (ni bot ni interne)
    var nd=(s.devices||[]).filter(function(d){return !d.bot&&!d.internal;}).length;
    if(nd>1)out.push(['tg_devices','',{n:nd}]);
    return out;
  }
  function tagsHtml(s){var ts=tagsOf(s);if(!ts.length)return'<span style="color:var(--muted);font-size:12px">—</span>';
    return'<div class="tags">'+ts.map(function(x){return'<span class="tag'+(x[1]?' '+x[1]:'')+'">'+esc(t(x[0],x[2]))+'</span>';}).join('')+'</div>';}
  var BOT_RE=/bot|crawl|spider|slurp|curl|wget|python|http-client|headless|phantom|preview|scan|proofpoint|mimecast|barracuda|safelinks|googleimageproxy|facebookexternalhit|whatsapp|bingpreview|yandex|ahrefs|semrush|monitor/i;
  function isBot(ua){return !ua||BOT_RE.test(ua);}

  // L'agrégation lourde (parse 200k events, séparation par appareil, exclusion
  // bots + IP internes) est faite CÔTÉ SERVEUR (/api/suivi.json). Ici on ne fait
  // que dériver le statut commercial à partir des events prospect déjà agrégés.
  function decorate(salons){salons.forEach(function(s){s.skey=statusOf(s);});return salons;}
  function isClient(s){return s.status==='live'||s.status==='active'||s.status==='trialing';}
  // Étapes cliquables (entonnoir + KPI) : chaque clé = un prédicat sur les events
  // PROSPECT du salon. On matche l'event précis (pas heat>=N) : le heat inclut le
  // chemin éditeur (editeur_ouvert=7) qui n'implique PAS d'avoir vu les tarifs.
  var FUNNEL_MATCH={
    visited:function(){return true;},
    pricing:function(s){return !!s.events['pricing_ouvert'];},
    domains:function(s){return !!s.events['etape_domaine'];},
    email:function(s){return !!s.events['etape_email'];},
    terms:function(s){return !!s.events['cgv_accepte'];},
    pay:function(s){return !!s.events['paiement_initie'];},
    client:function(s){return isClient(s);},
    custom:function(s){return !!s.events['domaine_perso'];},
    edited:function(s){return !!s.events['editeur_modifie'];}
  };
  var FUNNEL_LKEY={visited:'f_visited',pricing:'f_pricing',domains:'f_domains',email:'f_email',terms:'f_terms',pay:'f_pay',client:'f_client',custom:'k_custom',edited:'k_edited'};
  function fmtWhen(ts){if(!ts)return'—';var v=Date.parse(ts.replace(' ','T')+'Z');if(isNaN(v))return ts;var d=(Date.now()-v)/1000;
    if(d<3600)return Math.max(1,Math.round(d/60))+' '+t('u_min');if(d<86400)return Math.round(d/3600)+' '+t('u_h');return Math.round(d/86400)+' '+t('u_d');}
  function fmtDate(ts){if(!ts)return'';var p=ts.split(' ');if(p.length<2)return ts;var d=p[0].split('-');return d[2]+'/'+d[1]+' '+p[1].slice(0,5);}
  function esc(s){return s==null?'':String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function kpi(v,l,sub,cls,fkey){var on=fkey&&funnelFilter===fkey;
    return'<div class="kpi '+(cls||'')+(fkey?' clickable':'')+(on?' on':'')+'"'+(fkey?' data-funnel="'+fkey+'" title="'+esc(t('fhint'))+'"':'')+'><div class="v">'+v+'</div><div class="l">'+l+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';}
  function frow(key,name,val,max){var pct=Math.round(val/max*100);var on=funnelFilter===key;
    return'<div class="frow clickable'+(on?' on':'')+'" data-funnel="'+key+'" title="'+esc(t('fhint'))+'"><div class="fname">'+name+'</div><div class="fbar-wrap"><div class="fbar" style="width:'+pct+'%"></div><span class="fval">'+val+'</span></div></div>';}
  function arrow(k){if(sortKey!==k)return'';return'<span class="arr">'+(sortDir>0?'▲':'▼')+'</span>';}

  // Identifie l'appareil à partir du user_agent → icône + libellé lisible.
  function parseUA(ua){
    if(!ua||ua==='(inconnu)')return{icon:'❓',label:t('ua_unknown')};
    var u=ua.toLowerCase(),os,icon,br='';
    if(/iphone/.test(u)){os='iPhone';icon='📱';}
    else if(/ipad/.test(u)){os='iPad';icon='📱';}
    else if(/android/.test(u)){os='Android';icon='📱';}
    else if(/macintosh|mac os/.test(u)){os='Mac';icon='💻';}
    else if(/windows/.test(u)){os='Windows';icon='🖥️';}
    else if(/linux/.test(u)){os='Linux';icon='🖥️';}
    else if(/bot|crawl|spider|preview|scan|proofpoint|mimecast|barracuda|safelinks/.test(u)){os=t('ua_bot');icon='🤖';}
    else{os=t('ua_other');icon='🖥️';}
    if(/edg\//.test(u))br='Edge';else if(/crios|chrome/.test(u))br='Chrome';else if(/fxios|firefox/.test(u))br='Firefox';else if(/safari/.test(u))br='Safari';
    return{icon:icon,label:os+(br?' · '+br:'')};
  }
  function detailRow(s){
    var evts=Object.keys(s.events).sort(function(a,b){return(STAGE[b]||0)-(STAGE[a]||0);}).map(function(k){
      return '<div class="devt">'+esc(t(EVENT_KEY[k]||k))+' <b>×'+s.events[k].n+'</b> · <span style="color:var(--muted)">'+fmtDate(s.events[k].last)+'</span></div>';
    }).join('');
    var planBlock=s.plan?'<div><div class="dlabel">'+t('d_plan')+'</div><div class="devt"><b>'+esc(PLAN[s.plan]||s.plan)+'</b></div></div>':'';
    // Appareils (déjà triés serveur, plus récent en haut). Bot/interne marqués.
    var devs=(s.devices||[]).map(function(d){
        var p=parseUA(d.ua);
        var seen={},tl=[];
        (d.times||[]).forEach(function(ts){var f=fmtDate(ts);if(!seen[f]){seen[f]=1;tl.push({f:f,ts:ts});}});
        tl.sort(function(a,b){return a.ts<b.ts?1:-1;});
        var times=tl.slice(0,24).map(function(o){return '<span>'+esc(o.f)+'</span>';}).join('')+((d.times||[]).length>=24?' …':'');
        var flag=d.internal?'<span class="dflag f-int">'+t('d_internal')+'</span>':(d.bot?'<span class="dflag f-bot">'+t('d_bot')+'</span>':'');
        return '<details class="dev'+(d.internal||d.bot?' muted':'')+'"><summary>'
          +'<span class="ico">'+p.icon+'</span><span class="dlab">'+esc(p.label)+'</span>'+flag
          +'<span class="dtime">· '+esc(fmtDate(d.last))+'</span>'
          +'<span class="dcnt">'+d.visits+' '+t('d_visits')+'</span></summary>'
          +'<div class="dev-detail">'
          +'<div class="dlabel">'+t('d_connections')+' <span style="font-weight:400;text-transform:none">('+d.n+' '+esc(t('d_events'))+')</span></div><div class="dtimes">'+times+'</div>'
          +'<div class="dlabel">'+t('d_ip')+'</div><div class="dmono">'+esc(d.ip||'—')+'</div>'
          +'<div class="dlabel" style="margin-top:8px">'+t('d_ua')+'</div><div class="dmono">'+esc(d.ua)+'</div>'
          +'</div></details>';
      }).join('');
    return '<tr class="detail"><td colspan="6"><div class="dgrid">'
      +planBlock
      +'<div><div class="dlabel">'+t('d_events')+'</div>'+evts+'</div>'
      +'<div style="grid-column:1/-1"><div class="dlabel">'+t('d_devices')+'</div>'+devs+'</div>'
      +'</div></td></tr>';
  }

  function render(){
    var salons=salonsData.slice();
    var q=($('q').value||'').toLowerCase().trim();
    if(q)salons=salons.filter(function(s){return(s.salon+' '+s.ville+' '+s.email).toLowerCase().indexOf(q)>=0;});
    // Comptes de l'entonnoir : sur le périmètre RECHERCHÉ complet (le filtre par
    // étape n'affecte que la liste, pas les barres). Matche l'event précis.
    var cnt=function(k){return salons.filter(FUNNEL_MATCH[k]).length;};
    var visited=cnt('visited'),pricing=cnt('pricing'),domains=cnt('domains'),email=cnt('email'),terms=cnt('terms'),pay=cnt('pay'),clients=cnt('client');
    var custom=cnt('custom'),edited=cnt('edited');

    // Bandeau IP : montre l'IP de l'admin + bouton d'exclusion (Flaw 2).
    var myIp=META.myIp,excl=(META.excludedIps||[]).indexOf(myIp)>=0;
    var nExcl=(META.excludedIps||[]).length;
    var html='';
    if(myIp){
      html+='<div class="ipbar">'
        +'<span class="ipbar-txt">'+t('my_ip')+' <b class="dmono">'+esc(myIp)+'</b>'
        +(nExcl?' · '+t('n_excluded',{n:nExcl}):'')+'</span>'
        +'<button class="ipbtn'+(excl?' on':'')+'" id="ipToggle">'+(excl?t('ip_included'):t('ip_exclude'))+'</button>'
        +'</div>';
    }

    // KPI = SIGNAUX HORS ENTONNOIR uniquement (pas de doublon avec les barres) :
    // domaine perso tapé, démo éditée, CGV, clients + qualité du trafic.
    var tot=META.totals||{};
    html+='<div class="kpis">';
    html+=kpi(custom,t('k_custom'),'','hot','custom');
    html+=kpi(edited,t('k_edited'),'','hot','edited');
    html+=kpi(terms,t('k_cgv'),'','hot','terms');
    html+=kpi(clients,t('k_clients'),'','ok','client');
    html+=kpi(tot.humanEvents||0,t('k_prospect_ev'),t('k_filtered',{b:tot.botEvents||0,i:tot.internalEvents||0}),'');
    html+='</div>';

    // Entonnoir comportemental (prospect uniquement : bots + IP internes exclus).
    // 8 étapes = flow réel du checkout (wizard 3 étapes + CGV + paiement).
    var maxF=Math.max(visited,1);
    html+='<div class="section-title">'+t('funnel_title')+'</div><div class="funnel">';
    html+=frow('visited',t('f_visited'),visited,maxF)+frow('pricing',t('f_pricing'),pricing,maxF)+frow('domains',t('f_domains'),domains,maxF)+frow('email',t('f_email'),email,maxF)+frow('terms',t('f_terms'),terms,maxF)+frow('pay',t('f_pay'),pay,maxF)+frow('client',t('f_client'),clients,maxF);
    html+='</div>';

    // Filtre par étape d'entonnoir (clic sur une barre / un KPI) → restreint la
    // liste. Les chips de statut opèrent ensuite sur ce sous-ensemble.
    var base=funnelFilter?salons.filter(FUNNEL_MATCH[funnelFilter]):salons;
    var counts={all:base.length,client:0,hot:0,engaged:0,interested:0,curious:0};
    base.forEach(function(s){counts[s.skey]=(counts[s.skey]||0)+1;});
    var shown=(statusFilter==='all')?base.slice():base.filter(function(s){return s.skey===statusFilter;});

    shown.sort(function(a,b){var av,bv;
      if(sortKey==='status'){av=STATUS_ORDER[a.skey]||0;bv=STATUS_ORDER[b.skey]||0;if(av===bv){av=a.last;bv=b.last;}}
      else if(sortKey==='salon'){av=a.salon.toLowerCase();bv=b.salon.toLowerCase();}
      else if(sortKey==='count'){av=a.visits;bv=b.visits;}
      else{av=a.last;bv=b.last;}
      return av<bv?-1*sortDir:(av>bv?1*sortDir:0);});

    html+='<div class="section-title">'+t('recall')+' ('+counts.all+')</div>';
    html+='<div class="filterbar">';
    if(funnelFilter){
      html+='<button class="fbtn funnelchip on" id="clearFunnel">'+esc(t('fil_prefix'))+' '+esc(t(FUNNEL_LKEY[funnelFilter]))+' <span class="fx">✕</span></button>';
    }
    html+='<button class="fbtn'+(statusFilter==='all'?' on':'')+'" data-filter="all">'+t('f_all')+' <span class="c">'+counts.all+'</span></button>';
    STATUS_KEYS.forEach(function(k){
      if(!counts[k])return;
      html+='<button class="fbtn'+(statusFilter===k?' on':'')+'" data-filter="'+k+'"><span class="fdot" style="background:'+STATUS_DOT[k]+'"></span>'+esc(t('stt_'+k))+' <span class="c">'+counts[k]+'</span></button>';
    });
    html+='</div>';
    if(!shown.length)html+='<div class="msg">'+t('none')+'</div>';
    else{
      html+='<div class="tbl-wrap"><table><thead><tr>'
        +'<th class="sortable" data-k="salon">'+t('th_salon')+arrow('salon')+'</th>'
        +'<th class="sortable" data-k="status">'+t('th_status')+arrow('status')+'</th>'
        +'<th>'+t('th_signals')+'</th>'
        +'<th class="sortable num" data-k="count">'+t('th_visits')+arrow('count')+'</th>'
        +'<th class="sortable" data-k="last">'+t('th_date')+arrow('last')+'</th>'
        +'<th></th></tr></thead><tbody>';
      shown.forEach(function(s){var open=expanded[s.slug];
        html+='<tr class="row" data-slug="'+esc(s.slug)+'">'
          +'<td><span class="caret">'+(open?'▾':'▸')+'</span><span class="salon">'+esc(s.salon)+'</span><div class="loc" style="margin-left:14px">'+esc(s.ville)+(s.email?' · '+esc(s.email):'')+'</div></td>'
          +'<td>'+statusBadge(s.skey)+'</td>'
          +'<td>'+tagsHtml(s)+'</td>'
          +'<td class="num" title="'+s.count+' '+esc(t('d_events'))+'">'+s.visits+'</td>'
          +'<td class="when" title="'+esc(s.last)+'">'+fmtDate(s.last)+'<div style="font-size:11px">'+fmtWhen(s.last)+'</div></td>'
          +'<td style="white-space:nowrap"><a class="tlink" href="'+PREVIEW_REDIR+encodeURIComponent(s.slug)+'" target="_blank" rel="noopener" data-stop="1">'+t('see')+'</a> <a class="tlink" href="#" data-stop="1" data-photos="'+esc(s.slug)+'" title="'+esc(t('ttl_photos'))+'" style="font-size:15px;text-decoration:none">📷</a> '
          +(inCalling.has(s.slug)
            ?'<a class="tlink" href="/admin/calling.html?slug='+encodeURIComponent(s.slug)+'" data-stop="1" title="'+esc(t('ttl_incall'))+'" style="font-size:15px;text-decoration:none">✅</a>'
            :'<a class="tlink" href="#" data-stop="1" data-call="'+esc(s.slug)+'" title="'+esc(t('ttl_addcall'))+'" style="font-size:15px;text-decoration:none">📞</a>')
          +'</td></tr>';
        if(open)html+=detailRow(s);
      });
      html+='</tbody></table></div>';
    }
    $('content').innerHTML=html;

    Array.prototype.forEach.call(document.querySelectorAll('th.sortable'),function(th){
      th.onclick=function(){var k=th.getAttribute('data-k');if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='salon')?1:-1;}render();};});
    Array.prototype.forEach.call(document.querySelectorAll('.fbtn[data-filter]'),function(b){
      b.onclick=function(){statusFilter=b.getAttribute('data-filter');render();};});
    // Clic sur une étape (barre d'entonnoir OU carte KPI) → filtre la liste.
    Array.prototype.forEach.call(document.querySelectorAll('[data-funnel]'),function(el){
      el.onclick=function(){var k=el.getAttribute('data-funnel');funnelFilter=(funnelFilter===k)?null:k;statusFilter='all';render();};});
    var cf=$('clearFunnel');if(cf)cf.onclick=function(){funnelFilter=null;render();};
    var ipT=$('ipToggle');
    if(ipT)ipT.onclick=function(){
      var on=(META.excludedIps||[]).indexOf(META.myIp)<0; // pas encore exclu → on exclut
      ipT.disabled=true;ipT.textContent='…';
      fetch('/admin/api/suivi/exclude-ip',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({ip:META.myIp,on:on})})
        .then(function(r){return r.json();})
        .then(function(j){if(j.excludedIps)META.excludedIps=j.excludedIps;load();}) // recharge : l'entonnoir se recompte serveur
        .catch(function(){ipT.disabled=false;render();});
    };
    Array.prototype.forEach.call(document.querySelectorAll('tr.row'),function(tr){
      tr.onclick=function(e){if(e.target.closest('[data-stop]'))return;var sl=tr.getAttribute('data-slug');expanded[sl]=!expanded[sl];render();};});
    Array.prototype.forEach.call(document.querySelectorAll('[data-photos]'),function(a){
      a.onclick=function(e){

        PhotoModal.open(a.getAttribute('data-photos'),nm);
      };});
    Array.prototype.forEach.call(document.querySelectorAll('[data-call]'),function(a){
      a.onclick=function(e){e.preventDefault();addToCalling(a.getAttribute('data-call'),a);};});
  }

  // Transfert 1-clic d'un salon du Suivi vers la prospection téléphonique.
  // Le backend résout le numéro (DB puis Google Places) et évite les doublons.
  function addToCalling(slug,el){
    if(el){el._prev=el.textContent;el.textContent='⏳';}
    fetch('/admin/api/calling/add',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({slug:slug,added_from:'tracking'})})
      .then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||('http '+r.status));return j;});})
      .then(function(j){
        inCalling.add(slug); // état persistant : l'icône passe à ✅ (re-render)
        var p=j.prospect||{};
        var tel=p.telephone?(' · '+p.telephone):t('toast_nonum');
        stToast((j.already?t('toast_already'):t('toast_added'))+tel);
        render();
      })
      .catch(function(e){if(el&&el._prev)el.textContent=el._prev;stToast(t('toast_err')+e.message);});
  }

  // Salons déjà dans la prospection téléphonique → icône ✅ persistante.
  function loadCallingSlugs(){
    fetch('/admin/api/calling/slugs',{credentials:'same-origin',headers:{'Accept':'application/json'}})
      .then(function(r){return r.ok?r.json():{slugs:[]};})
      .then(function(j){inCalling=new Set(j.slugs||[]);if(salonsData.length)render();})
      .catch(function(){});
  }

  function load(){
    $('updated').textContent='…';
    loadCallingSlugs();
    fetch(JSON_URL+'?t='+Date.now(),{credentials:'same-origin',cache:'no-store',headers:{'Accept':'application/json'}}).then(function(r){
      if(r.status===401||r.status===302||r.redirected)throw new Error('auth');
      if(!r.ok)throw new Error('http '+r.status);
      return r.json();
    }).then(function(d){
      salonsData=decorate(d.salons||[]);
      META={myIp:d.myIp||'',excludedIps:d.excludedIps||[],totals:d.totals||{}};
      var n=new Date();
      $('updated').textContent=t('maj')+' '+n.getHours()+'h'+('0'+n.getMinutes()).slice(-2);
      render();
    }).catch(function(e){
      if(e.message==='auth')$('content').innerHTML='<div class="msg">'+t('auth')+'<br><br><a href="/admin/login">'+t('signin')+'</a></div>';
      else $('content').innerHTML='<div class="msg">'+t('err')+esc(e.message)+'</div>';
      $('updated').textContent='';
    });
  }

  // (langue gérée par admin-nav.js, partagé sur toutes les pages)
  $('refresh').onclick=load;
  $('export').onclick=function(){window.open(CSV_URL,'_blank');};
  $('q').addEventListener('input',function(){if(salonsData.length)render();});
  $('autorefresh').addEventListener('change',function(){if(this.checked)autoTimer=setInterval(load,60000);else clearInterval(autoTimer);});
  // (Modale photos → module partagé /admin/photo-modal.js, utilisé aussi par le cockpit)
  function stToast(m,ms){var t=$('st-toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('on');},ms||3500);}

  applyStatic();
  load();
})();
</script>
</body>
</html>
