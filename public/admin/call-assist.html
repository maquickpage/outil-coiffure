<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MaQuickPage · Assistance d'appel IA</title>
<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;}
  .topbar{background:#1a1a1a;color:#fff;padding:12px 0;}
  .topbar-inner{max-width:1240px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .brand{font-weight:600;font-size:1.15rem;color:#c9a96e;}
  .spacer{flex:1;}
  .hbtn{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .hbtn:hover{background:rgba(255,255,255,.12);}
  .seg{display:inline-flex;border:1px solid rgba(255,255,255,.3);border-radius:9px;overflow:hidden;}
  .seg button{background:transparent;color:#fff;border:none;padding:7px 14px;font-size:13.5px;font-weight:700;cursor:pointer;}
  .seg button.on{background:#c9a96e;color:#1a1a1a;}
  main{max-width:1240px;margin:0 auto;padding:14px 16px;}
  .cols{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start;}
  @media(max-width:900px){.cols{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:16px;}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px;}
  #map-view{display:none;}
  .map-cols{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
  .map-col{min-width:230px;flex:1;}
  .map-col h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 8px;}
  .map-node{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:8px;}
  .map-node .nl{font-weight:800;font-size:14px;}
  .map-node .ns{font-size:12.5px;color:var(--cool);margin:4px 0 6px;}
  .map-node .mb{font-size:12px;color:var(--muted);}
  .map-node .mb b{color:var(--ink);}
</style>
<link rel="stylesheet" href="/admin/admin-nav.css">
<link rel="stylesheet" href="/admin/call-assist.css">
<link rel="icon" type="image/png" href="/admin/picto-coif.png">
</head>
<body>
<header class="anav">
  <div class="anav-inner">
    <a class="anav-brand" href="/admin/"><img class="anav-logo" src="/admin/picto-coif.png" alt=""><span>Outil coiffure</span></a>
    <nav class="anav-tabs">
      <a class="anav-tab" data-path="/admin" href="/admin/">Tableau de bord</a>
      <a class="anav-tab" data-path="/admin/photos.html" href="/admin/photos.html">Photos</a>
      <a class="anav-tab" data-path="/admin/stats.html" href="/admin/stats.html">Suivi</a>
      <a class="anav-tab" data-path="/admin/nouveau-salon.html" href="/admin/nouveau-salon.html">➕ Nouveau salon</a>
      <a class="anav-tab" data-path="/admin/calling.html" href="/admin/calling.html">☎️ Prospection</a>
    </nav>
    <span class="anav-spacer"></span>
    <div class="anav-right"><button class="anav-logout" id="anav-logout" type="button">Déconnexion</button></div>
  </div>
</header>
<script src="/admin/admin-nav.js?v=20260708-navi18n"></script>

<div class="topbar">
  <div class="topbar-inner">
    <button class="hbtn" id="back-cockpit">← Retour au cockpit</button>
    <span class="brand">🧭 Assistance d'appel IA</span>
    <span id="salon-name" style="font-size:13px;color:rgba(255,255,255,.7)"></span>
    <span class="spacer"></span>
    <div class="seg"><button id="tab-guide" class="on">Mode guidé</button><button id="tab-map">Vue carte</button></div>
  </div>
</div>

<main>
  <div id="guided-view">
    <div class="cols">
      <div class="card"><div id="assistant"></div></div>
      <div class="card"><h2>💎 Arguments clés (vérifiés dans le produit)</h2><div id="args"></div></div>
    </div>
  </div>
  <div id="map-view">
    <div class="card"><h2 id="map-title">Vue carte — le parcours d'appel complet</h2><div class="map-cols" id="map"></div></div>
  </div>
</main>

<!-- SDK Azure Speech AUTO-HÉBERGÉ (plus de CDN externe) + modules assistant -->
<script async src="/admin/vendor/speech-sdk.min.js"></script>
<script src="/admin/call-tree.js"></script>
<script src="/admin/call-copilot.js"></script>
<script>
(function(){
  'use strict';
  var $=function(id){return document.getElementById(id);};
  var esc=function(s){return s==null?'':String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});};
  var qs=new URLSearchParams(location.search);
  var SLUG=qs.get('slug')||'';

  // ---- Retour au cockpit : ferme l'onglet si ouvert depuis le cockpit,
  // sinon navigue vers la page Prospection.
  $('back-cockpit').onclick=function(){
    if(window.opener){ window.close(); return; }
    location.href='/admin/calling.html';
  };

  // ---- Assistant (module partagé) ----
  var assistant=window.mountCallAssistant($('assistant'),{
    salon:{nom:'',ville:''},
    compact:false,
    onNode:function(n){ highlightMap(n.id); },
    onApproach:function(){ mapBuilt=false; if($('map-view').style.display==='block') buildMap(); },
  });

  if(SLUG){
    fetch('/admin/api/calling/'+encodeURIComponent(SLUG),{credentials:'same-origin',headers:{'Accept':'application/json'}})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(d){ if(d&&d.prospect){ assistant.setSalon({nom:d.prospect.nom,ville:d.prospect.ville}); $('salon-name').textContent='· '+d.prospect.nom; } })
      .catch(function(){});
  }

  // ---- Arguments clés ----
  $('args').innerHTML=(window.SALES_ARGS||[]).map(function(a){
    return '<div class="arg"><div class="at">'+esc(a.t)+'</div><div class="ad">'+esc(a.d)+'</div></div>';
  }).join('');

  // ---- Onglets guidé / carte ----
  function setTab(t){
    $('tab-guide').classList.toggle('on',t==='guide');
    $('tab-map').classList.toggle('on',t==='map');
    $('guided-view').style.display=t==='guide'?'block':'none';
    $('map-view').style.display=t==='map'?'block':'none';
    if(t==='map') buildMap();
  }
  $('tab-guide').onclick=function(){setTab('guide');};
  $('tab-map').onclick=function(){setTab('map');};

  // ---- Vue carte (reconstruite au changement d'approche) ----
  var mapBuilt=false;
  function buildMap(){
    if(mapBuilt)return; mapBuilt=true;
    var T=assistant.tree(), N=T.nodes;
    $('map-title').textContent='Vue carte — '+T.name+' ('+T.school+')';
    var byPhase={}; T.phases.forEach(function(p){byPhase[p]=[];});
    Object.keys(N).forEach(function(k){var n=N[k];(byPhase[n.phase]=byPhase[n.phase]||[]).push(n);});
    var h='';
    T.phases.forEach(function(p){
      if(!byPhase[p]||!byPhase[p].length)return;
      h+='<div class="map-col"><h3>'+esc(p)+'</h3>';
      byPhase[p].forEach(function(n){
        h+='<div class="map-node" id="mn-'+esc(n.id)+'"><div class="nl">'+esc(n.label)+'</div><div class="ns">'+esc(n.summary)+'</div>';
        (n.branches||[]).forEach(function(b){var t=N[b.to];h+='<div class="mb">↳ <b>'+esc(b.label)+'</b> → '+esc(t?t.label:b.to)+'</div>';});
        h+='</div>';
      });
      h+='</div>';
    });
    $('map').innerHTML=h;
    highlightMap(assistant.guide.current().id);
  }
  function highlightMap(id){
    Array.prototype.forEach.call(document.querySelectorAll('.map-node'),function(el){el.style.outline='';});
    var el=$('mn-'+id); if(el){el.style.outline='3px solid var(--gold)';}
  }
})();
</script>
</body>
</html>
