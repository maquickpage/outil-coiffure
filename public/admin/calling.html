<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MaQuickPage · Prospection téléphonique</title>
<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;padding-bottom:60px;}
  .topbar{background:#1a1a1a;color:#fff;padding:13px 0;}
  .topbar-inner{max-width:1240px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:500;font-size:1.25rem;color:#c9a96e;}
  .spacer{flex:1;}
  .hbtn{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;}
  .hbtn:hover{background:rgba(255,255,255,.12);}
  main{max-width:1240px;margin:0 auto;padding:16px 18px;}
  .msg{text-align:center;color:var(--muted);padding:44px 20px;font-size:15px;}
  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 14px;}
  .kpi .v{font-size:24px;font-weight:800;line-height:1;}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600;}
  .kpi.due .v{color:var(--hot);}.kpi.ok .v{color:var(--ok);}.kpi.gold .v{color:var(--gold-d);}
  .kpi.due{border-color:#e3b4ae;background:#fdf6f5;}
  /* View switch */
  .vswitch{display:flex;gap:6px;margin:6px 0 16px;flex-wrap:wrap;align-items:center;}
  .vbtn{border:1.5px solid var(--border);background:#fff;color:var(--ink);padding:9px 16px;border-radius:10px;font-size:14.5px;font-weight:700;cursor:pointer;}
  .vbtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  /* Cockpit */
  .cock{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start;}
  @media(max-width:900px){.cock{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .cardpad{padding:18px;}
  /* Navigation file dans le cockpit */
  .qnav{display:flex;align-items:center;gap:10px;background:#faf8f2;border-bottom:1px solid var(--border);padding:10px 18px;}
  .qbtn{border:1.5px solid var(--border);background:#fff;border-radius:9px;padding:7px 13px;font-size:13.5px;font-weight:800;cursor:pointer;color:var(--ink);}
  .qbtn:hover:not(:disabled){border-color:var(--gold);background:#fdf3dc;}
  .qbtn:disabled{opacity:.35;cursor:default;}
  .qpos{font-size:13px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;}
  .cname{font-size:22px;font-weight:800;line-height:1.15;}
  .cloc{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .telrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0 6px;}
  .telbig{font-size:25px;font-weight:800;color:var(--blue);text-decoration:none;letter-spacing:.5px;}
  .telbig:hover{text-decoration:underline;}
  .telnone{font-size:16px;color:var(--hot);font-weight:700;}
  .minibtn{border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .minibtn:hover{border-color:var(--gold);background:#fdf3dc;}
  .phsrc{font-size:11.5px;color:var(--muted);}
  .metaline{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .chip{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;background:#eef0f2;color:var(--cool);}
  .chip.warm{background:#fef3c7;color:#92400e;}.chip.hot{background:#fde2e0;color:#9b2c22;}.chip.ok{background:#dcfce7;color:#14532d;}
  .shotlink{display:block;position:relative;}
  .shot{display:block;width:100%;max-height:200px;object-fit:cover;object-position:top;background:#eee;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  .shotcta{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.72);color:#fff;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;}
  .noteslab{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;margin:12px 0 6px;}
  textarea.notes{width:100%;min-height:56px;border:1.5px solid var(--border);border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;resize:vertical;outline:none;}
  textarea.notes:focus{border-color:var(--gold);}
  /* Section « Envoyer la démo » (SMS à copier + email 1-clic) */
  .sendsec{border-top:1px solid var(--border);padding:14px 18px;background:#fbf9f4;}
  .sendsec .sub{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;margin:10px 0 6px;}
  .sendsec .sub:first-child{margin-top:0;}
  .sendsec textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13.5px;font-family:inherit;resize:vertical;outline:none;background:#fff;}
  .sendsec textarea:focus{border-color:var(--gold);}
  .sendsec input{border:1.5px solid var(--border);border-radius:9px;padding:7px 10px;font-size:13.5px;font-family:inherit;outline:none;background:#fff;}
  .sendsec input:focus{border-color:var(--gold);}
  .sendline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;}
  .sendbtn{border:none;background:var(--ink);color:#fff;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:800;cursor:pointer;}
  .sendbtn:hover{opacity:.88;}
  .sendbtn:disabled{opacity:.5;cursor:wait;}
  .sendbtn.ok{background:var(--ok);}
  /* Outcome buttons */
  .obar{border-top:1px solid var(--border);padding:14px 18px;background:#faf8f2;}
  .osec{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;margin:0 0 8px;}
  .ogrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .obtn{border:1.5px solid var(--border);background:#fff;border-radius:10px;padding:10px 13px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);}
  .obtn:hover{border-color:var(--gold);background:#fdf3dc;}
  .obtn.good{border-color:#bfe6c8;}.obtn.good:hover{background:#eafaef;border-color:var(--ok);}
  .obtn.bad{border-color:#e3b4ae;}.obtn.bad:hover{background:#fdecea;border-color:var(--hot);}
  .obtn:disabled{opacity:.5;cursor:not-allowed;}
  .whenpick{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--cool);margin-bottom:10px;}
  .whenpick input{border:1.5px solid var(--border);border-radius:8px;padding:6px 9px;font-size:13px;font-family:inherit;}
  /* History */
  .hist{margin-top:12px;}
  .hrow{display:flex;gap:8px;align-items:baseline;font-size:12.5px;padding:5px 0;border-bottom:1px solid #f0ece1;}
  .hrow .ho{font-weight:700;}.hrow .hn{color:var(--cool);}.hrow .ht{color:var(--muted);margin-left:auto;white-space:nowrap;}
  /* List */
  .filterbar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px;}
  .fbtn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);background:#fff;color:var(--ink);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;}
  .fbtn:hover{border-color:var(--gold);}
  .fbtn.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:10px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid #f0ece1;vertical-align:middle;}
  tr.qrow{cursor:pointer;}
  tr.qrow:hover td{background:#fdf3dc;}
  .salon{font-weight:700;}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .b-a_appeler{background:#eef0f2;color:#5b6470;}.b-rappeler{background:#fef3c7;color:#92400e;}
  .b-interesse{background:#e0e7ff;color:#3730a3;}.b-demo_envoyee{background:#dbeafe;color:#1e40af;}
  .b-gagne{background:#dcfce7;color:#14532d;}.b-perdu{background:#f3f4f6;color:#6b7280;}.b-ne_pas_rappeler{background:#fde2e0;color:#9b2c22;}
  .due-dot{color:var(--hot);font-weight:800;}
  .lact{color:var(--blue);text-decoration:none;font-weight:700;font-size:13px;cursor:pointer;}
  .lx{color:var(--hot);cursor:pointer;font-weight:700;}
  /* Add box */
  .addbox{position:relative;}
  .addbox input{border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;min-width:230px;outline:none;}
  .addbox input:focus{border-color:var(--gold);}
  .addres{position:absolute;z-index:30;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.12);max-height:320px;overflow:auto;display:none;}
  .addres.on{display:block;}
  .ares-it{padding:9px 12px;border-bottom:1px solid #f0ece1;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .ares-it:hover{background:#faf8f2;}
  .ares-it .an{font-weight:700;}.ares-it .al{font-size:12px;color:var(--muted);}
  .ares-it .atag{margin-left:auto;font-size:11.5px;color:var(--ok);font-weight:700;}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:600;transition:transform .25s;z-index:130;max-width:90vw;}
  #toast.on{transform:translateX(-50%) translateY(0);}
  .fullassist{display:block;text-align:center;margin-top:8px;font-size:13px;color:var(--blue);font-weight:700;text-decoration:none;}
  .fullassist:hover{text-decoration:underline;}
</style>

<body>

    <div class="addbox">

<main>
  <div class="kpis" id="kpis"></div>
  <div class="vswitch">
    <button class="vbtn on" id="v-cockpit" data-view="cockpit">🎯 Cockpit d'appel</button>
    <button class="vbtn" id="v-list" data-view="list">📋 File d'appel</button>
  </div>

  <!-- Cockpit : fiche (gauche, re-rendue à chaque navigation) + assistant
       (droite, monté UNE fois — il survit aux changements de fiche). -->
  <div id="view-cockpit">
    <div class="cock">
      <div id="fiche"><div class="msg">Chargement de la file…</div></div>
      <div>
        <div class="card"><div class="cardpad" style="padding:14px 16px"><div id="assist-mount"></div></div></div>
        <a class="fullassist" id="assist-full" href="/admin/call-assist.html" target="_blank" rel="noopener">🗺 Vue carte &amp; préparation (plein écran) ↗</a>

<!-- SDK Speech auto-hébergé + arbre + module assistant + modale photos partagée -->
<script async src="/admin/vendor/speech-sdk.min.js"></script>
<script src="/admin/call-tree.js"></script>
<script src="/admin/call-copilot.js"></script>
<script src="/admin/photo-modal.js"></script>
<script>
(function(){
  'use strict';
  var $=function(id){return document.getElementById(id);};
  var esc=function(s){return s==null?'':String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});};
  var view='cockpit', listFilter='all';

  var STATUS_LABEL={a_appeler:'À appeler',rappeler:'À rappeler',interesse:'Intéressé',demo_envoyee:'Démo envoyée',gagne:'✅ Gagné',perdu:'Perdu',ne_pas_rappeler:'🚫 Ne pas rappeler'};
  var OUTCOME_LABEL={no_answer:'Pas de réponse',voicemail:'Messagerie',busy:'Occupé',callback:'À rappeler',wrong_number:'Mauvais numéro',interested:'Intéressé',demo_sent:'Démo envoyée',not_interested:'Pas intéressé',do_not_call:'Ne pas rappeler',won:'Gagné'};
  var ACTIONABLE={a_appeler:1,rappeler:1,interesse:1,demo_envoyee:1};

  function api(path,opts){
    opts=opts||{};
    var headers=Object.assign({'Accept':'application/json'},opts.headers||{});
    if(opts.body&&!headers['Content-Type'])headers['Content-Type']='application/json';
    return fetch(path,Object.assign({credentials:'same-origin'},opts,{headers:headers})).then(function(r){
      if(r.status===401){location.href='/admin/login';throw new Error('auth');}
      return r.json().then(function(j){if(!r.ok)throw new Error(j.error||('http '+r.status));return j;});
    });
  }
  function toast(m,ms){var t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('on');},ms||3200);}

  function fmtWhen(ts){if(!ts)return'';var v=Date.parse(ts.replace(' ','T')+'Z');if(isNaN(v))return ts;
    var d=(Date.now()-v)/1000,fut=d<0;d=Math.abs(d);
    var s=d<3600?Math.max(1,Math.round(d/60))+' min':d<86400?Math.round(d/3600)+' h':Math.round(d/86400)+' j';
    return fut?('dans '+s):('il y a '+s);}
  function fmtDate(ts){if(!ts)return'';var p=ts.split(/[ T]/);if(p.length<2)return ts;var d=p[0].split('-');return d[2]+'/'+d[1]+' '+p[1].slice(0,5);}
  function isDue(p){if(!p.next_call_at)return false;if(!ACTIONABLE[p.status])return false;return Date.parse(p.next_call_at.replace(' ','T')+'Z')<=Date.now();}

  // ---- Assistant (module partagé) : monté UNE fois, survit à la navigation ----
  var assistant=window.mountCallAssistant($('assist-mount'),{salon:{nom:'',ville:''},compact:true});

  // ---- KPIs ----
  function loadStats(){
    api('/admin/api/calling/stats').then(function(s){
      var by=s.by_status||{};
      var h='';
      h+=kpi(by.a_appeler||0,'À appeler','');
      h+=kpi(s.due||0,'Rappels dus','due');
      h+=kpi(s.calls_today||0,"Appels aujourd'hui","");
      h+=kpi((s.reach_rate||0)+'%','Taux décroché','gold');
      h+=kpi(s.interested||0,'Intéressés','gold');
      h+=kpi(s.won||0,'Gagnés','ok');
      h+=kpi(s.total||0,'Total pipeline','');
      $('kpis').innerHTML=h;
    }).catch(function(){});
  }
  function kpi(v,l,cls){return'<div class="kpi '+(cls||'')+'"><div class="v">'+v+'</div><div class="l">'+esc(l)+'</div></div>';}

  // ---- View switch ----
  function setView(v){
    view=v;
    $('v-cockpit').classList.toggle('on',v==='cockpit');
    $('v-list').classList.toggle('on',v==='list');
    $('view-cockpit').style.display=v==='cockpit'?'block':'none';
    $('view-list').style.display=v==='list'?'block':'none';
    if(v==='list')loadList();
  }
  $('v-cockpit').onclick=function(){setView('cockpit');};
  $('v-list').onclick=function(){setView('list');};

  // =====================================================================
  // FILE D'ATTENTE DU COCKPIT : la même liste ordonnée que la File d'appel
  // (rappels dus > priorité > rappel le plus proche > récence), navigable
  // avec ‹ Précédent / Suivant ›.
  // =====================================================================
  var queue=[], qIndex=0;

  function firstActionableIndex(){
    for(var i=0;i<queue.length;i++){
      var p=queue[i];
      if(ACTIONABLE[p.status]&&(!p.next_call_at||isDue(p)))return i;
    }
    return queue.length?0:-1;
  }
  // targetSlug : rester/aller sur cette fiche après rechargement.
  function loadQueue(targetSlug){
    return api('/admin/api/calling/list').then(function(r){
      queue=r.rows||[];
      if(targetSlug){
        var i=queue.findIndex(function(p){return p.slug===targetSlug;});
        qIndex=i>=0?i:Math.min(qIndex,Math.max(queue.length-1,0));
      }else{
        qIndex=firstActionableIndex();
      }
    });
  }
  function showCurrent(){
    if(qIndex<0||!queue.length){renderEmpty();return;}
    qIndex=Math.max(0,Math.min(qIndex,queue.length-1));
    var slug=queue[qIndex].slug;
    api('/admin/api/calling/'+encodeURIComponent(slug)).then(function(d){
      renderFiche(d.prospect,d.logs||[]);
    }).catch(function(e){if(e.message!=='auth')$('fiche').innerHTML='<div class="card"><div class="cardpad msg">Erreur : '+esc(e.message)+'</div></div>';});
  }
  // Navigation CIRCULAIRE : « Précédent » sur la fiche 1 → dernière fiche,
  // « Suivant » sur la dernière → fiche 1.
  function nav(delta){
    if(queue.length<=1)return;
    qIndex=(qIndex+delta+queue.length)%queue.length;
    showCurrent();
  }

  function renderEmpty(){
    $('fiche').innerHTML='<div class="card"><div class="cardpad msg">🎉 Aucune fiche dans la file.<br><br>'
      +'Ajoute des salons depuis le <a href="/admin/stats.html" style="color:var(--blue)">Suivi</a> (bouton 📞) ou via la barre « ＋ Ajouter » ci-dessus.</div></div>';
  }

  function renderFiche(p,logs){
    // met à jour la fiche courante dans la file (statut/notes à jour)
    var iq=queue.findIndex(function(x){return x.slug===p.slug;});
    if(iq>=0)queue[iq]=p;

    assistant.setSalon({nom:p.nom,ville:p.ville});
    $('assist-full').href='/admin/call-assist.html?slug='+encodeURIComponent(p.slug);

    var tel=p.telephone
      ? '<a class="telbig" href="tel:'+esc(p.telephone.replace(/\s/g,''))+'">'+esc(p.telephone)+'</a>'
        +'<button class="minibtn" id="copytel">⧉ Copier</button>'
        +'<span class="phsrc">'+(p.phone_source==='google'?'via Google':p.phone_source==='manuel'?'saisi':'base')+'</span>'
      : '<span class="telnone">Numéro introuvable</span><button class="minibtn" id="findtel">🔎 Chercher sur Google</button>';
    var maps=p.maps_url?'<a class="minibtn" href="'+esc(p.maps_url)+'" target="_blank" rel="noopener">📍 Maps</a>':'';
    // Raccourcis outils (mêmes que dans le Suivi) : voir la démo + modale photos (héro/galerie).
    var tools='<a class="minibtn" href="'+esc(p.preview_url)+'" target="_blank" rel="noopener">👁 Voir</a><button class="minibtn" id="photosbtn" type="button">📷 Photos</button>';
    // Messages pré-écrits (SMS à copier + email 1-clic).
    var smsTxt='Bonjour ! Comme convenu au téléphone, voici votre site en démo : '+p.preview_url+' — Johann, MaQuickPage. Dites-moi ce que vous en pensez 🙂';
    var mailSubject='Votre site est prêt — '+p.nom;
    var mailBody='Bonjour,\n\nComme convenu au téléphone, voici la démo du site que nous avons déjà créé pour '+p.nom+' :\n'+p.preview_url+'\n\nVos photos, vos horaires et vos avis Google y sont déjà. S\'il vous plaît, il peut être en ligne en 5 minutes — domaine inclus, à votre nom, sans frais d\'installation.\n\nJe vous rappelle dans 2 jours pour avoir votre avis.\n\nBonne journée,\nJohann — MaQuickPage';
    var sendsec='<div class="sendsec">'
      +'<div class="sub">📱 SMS — copie et colle dans ton téléphone</div>'
      +'<textarea id="smstxt" rows="3">'+esc(smsTxt)+'</textarea>'
      +'<div class="sendline"><button class="sendbtn" id="smscopy" type="button">⧉ Copier le SMS</button><span style="font-size:12px;color:var(--muted)">'+(p.telephone?('à envoyer au '+esc(p.telephone)):'ou à un autre numéro')+'</span></div>'
      +'<div class="sub" style="margin-top:14px">✉️ Email — envoi direct en 1 clic</div>'
      +'<div class="sendline" style="margin:0 0 8px"><input id="mailto" type="email" placeholder="email du salon…" value="'+esc(p.email||'')+'" style="flex:1;min-width:180px"><input id="mailsubject" value="'+esc(mailSubject)+'" style="flex:2;min-width:220px"></div>'
      +'<textarea id="mailbody" rows="7">'+esc(mailBody)+'</textarea>'
      +'<div class="sendline"><button class="sendbtn" id="mailsend" type="button">✉️ Envoyer l\'email</button><span id="mailstatus" style="font-size:12px;color:var(--muted)"></span></div>'
      +'<div style="font-size:11.5px;color:var(--muted);margin-top:6px">💡 Dans l\'email reçu, le lien démo est automatiquement remplacé par une miniature cliquable du site.</div>'
      +'</div>';
    var shot=p.screenshot
      ? '<a class="shotlink" href="'+esc(p.preview_url)+'" target="_blank" rel="noopener"><img class="shot" src="'+esc(p.screenshot)+'" alt=""><span class="shotcta">👁 Voir sa démo en ligne →</span></a>'
      : '<div class="cardpad" style="border-top:1px solid var(--border);padding:10px 18px"><a class="minibtn" href="'+esc(p.preview_url)+'" target="_blank" rel="noopener">👁 Voir sa démo →</a></div>';
    var meta='';
    meta+='<span class="badge b-'+p.status+'">'+esc(STATUS_LABEL[p.status]||p.status)+'</span>';
    meta+='<span class="chip">Tentatives : '+(p.attempts||0)+'</span>';
    if(p.last_outcome)meta+='<span class="chip warm">Dernier : '+esc(OUTCOME_LABEL[p.last_outcome]||p.last_outcome)+' · '+esc(fmtWhen(p.last_called_at))+'</span>';
    if(p.next_call_at)meta+='<span class="chip'+(isDue(p)?' hot':'')+'">Rappel : '+esc(fmtDate(p.next_call_at))+'</span>';
    if(p.subscription_status)meta+='<span class="chip ok">Client '+esc(p.subscription_status)+'</span>';

    var histHtml='';
    if(logs&&logs.length){
      histHtml='<div class="hist"><div class="noteslab">Historique des appels</div>'+logs.map(function(l){
        return '<div class="hrow"><span class="ho">'+esc(OUTCOME_LABEL[l.outcome]||l.outcome)+'</span>'
          +(l.note?'<span class="hn">— '+esc(l.note)+'</span>':'')+'<span class="ht">'+esc(fmtDate(l.created_at))+'</span></div>';
      }).join('')+'</div>';
    }

    var html='<div class="card">'
      +'<div class="qnav">'
        +'<button class="qbtn" id="qprev"'+(queue.length<=1?' disabled':'')+'>‹ Précédent</button>'
        +'<span class="qpos">'+(qIndex+1)+' / '+queue.length+'</span>'
        +'<button class="qbtn" id="qnext"'+(queue.length<=1?' disabled':'')+'>Suivant ›</button>'
        +'<span style="flex:1"></span>'
        +'<button class="minibtn" id="remove" style="color:var(--hot)">🗑 Retirer</button>'
      +'</div>'
      +'<div class="cardpad">'
        +'<div class="cname">'+esc(p.nom)+'</div>'
        +'<div class="cloc">'+esc([p.adresse,p.code_postal,p.ville].filter(Boolean).join(', '))+'</div>'
        +'<div class="telrow">'+tel+maps+tools+'</div>'
        +'<div class="metaline">'+meta+'</div>'
      +'</div>'
      +shot
      +sendsec
      +'<div class="cardpad">'
        +'<div class="noteslab">Notes (enregistrées automatiquement)</div>'
        +'<textarea class="notes" id="notes" placeholder="Nom du gérant, contexte, ce qui a été dit…">'+esc(p.notes||'')+'</textarea>'
        +histHtml
      +'</div>'
      +'<div class="obar">'
        +'<div class="whenpick"><label>📅 Rappeler le :</label><input type="datetime-local" id="nextcall"><span style="font-size:11.5px">(sinon +2 jours par défaut pour un rappel)</span></div>'
        +'<div class="osec">Quelqu\'un a décroché</div>'
        +'<div class="ogrid">'
          +obtn('interested','🌟 Intéressé','good')
          +obtn('demo_sent','📩 Démo/lien envoyé','good')
          +obtn('won','✅ Devenu client','good')
          +obtn('callback','🔁 Me rappeler / plus tard','')
          +obtn('not_interested','😐 Pas intéressé','bad')
          +obtn('do_not_call','🚫 Ne pas rappeler','bad')
        +'</div>'
        +'<div class="osec">Personne n\'a décroché</div>'
        +'<div class="ogrid">'
          +obtn('no_answer','📵 Pas de réponse','')
          +obtn('voicemail','📬 Messagerie','')
          +obtn('busy','⛔ Occupé','')
          +obtn('wrong_number','❌ Mauvais numéro','bad')
        +'</div>'
      +'</div>'
    +'</div>';
    $('fiche').innerHTML=html;

    // Bindings
    $('qprev').onclick=function(){nav(-1);};
    $('qnext').onclick=function(){nav(1);};
    var pb=$('photosbtn');if(pb)pb.onclick=function(){PhotoModal.open(p.slug,p.nom);};
    var sc=$('smscopy');if(sc)sc.onclick=function(){
      navigator.clipboard&&navigator.clipboard.writeText($('smstxt').value);
      sc.textContent='✓ Copié';sc.classList.add('ok');
      setTimeout(function(){sc.textContent='⧉ Copier le SMS';sc.classList.remove('ok');},2200);
      toast('SMS copié — colle-le dans ton téléphone');
      // Trace le partage → le salon apparaît dans l'onglet Suivi (best-effort).
      api('/admin/api/calling/'+encodeURIComponent(p.slug)+'/log-share',{method:'POST',body:JSON.stringify({channel:'sms'})}).catch(function(){});
    };
    var ms=$('mailsend');if(ms)ms.onclick=function(){
      var to=($('mailto').value||'').trim();
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)){toast('Adresse email invalide');$('mailto').focus();return;}
      ms.disabled=true;ms.textContent='Envoi…';$('mailstatus').textContent='';
      api('/admin/api/calling/'+encodeURIComponent(p.slug)+'/send-email',{method:'POST',body:JSON.stringify({to:to,subject:$('mailsubject').value,body:$('mailbody').value})})
        .then(function(){ms.textContent='✓ Envoyé';ms.classList.add('ok');$('mailstatus').textContent='Envoyé à '+to;toast('Email envoyé ✓ — pense à cliquer « 📩 Démo/lien envoyé »');})
        .catch(function(e){ms.disabled=false;ms.textContent='✉️ Envoyer l\'email';toast('Erreur : '+e.message);$('mailstatus').textContent=e.message;});
    };
    var nt=$('notes');
    nt.onblur=function(){if((nt.value||'')!==(p.notes||'')){api('/admin/api/calling/'+encodeURIComponent(p.slug)+'/update',{method:'POST',body:JSON.stringify({notes:nt.value})}).catch(function(){});}};
    var ct=$('copytel');if(ct)ct.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(p.telephone);toast('Numéro copié');};
    var ft=$('findtel');if(ft)ft.onclick=function(){ft.textContent='🔎 Recherche…';ft.disabled=true;
      api('/admin/api/calling/'+encodeURIComponent(p.slug)+'/resolve-phone',{method:'POST'}).then(function(d){
        if(d.found){toast('Numéro trouvé : '+d.telephone);renderFiche(d.prospect,logs);}else{toast('Aucun numéro trouvé sur Google');ft.textContent='🔎 Réessayer';ft.disabled=false;}
      }).catch(function(e){toast('Erreur : '+e.message);ft.textContent='🔎 Chercher sur Google';ft.disabled=false;});};
    $('remove').onclick=function(){if(!confirm('Retirer '+p.nom+' de la file d\'appel ? (l\'historique est conservé)'))return;
      api('/admin/api/calling/'+encodeURIComponent(p.slug),{method:'DELETE'}).then(function(){
        toast('Retiré de la file');loadStats();
        loadQueue().then(function(){qIndex=Math.min(qIndex,Math.max(queue.length-1,0));showCurrent();});
      });};
    Array.prototype.forEach.call($('fiche').querySelectorAll('[data-out]'),function(b){
      b.onclick=function(){recordOutcome(p.slug,b.getAttribute('data-out'));};});
  }
  function obtn(out,label,cls){return'<button class="obtn'+(cls?' '+cls:'')+'" data-out="'+out+'">'+label+'</button>';}

  // Résultat d'appel → enregistre, puis passe à la fiche SUIVANTE de la file
  // (et resynchronise la file en arrière-plan).
  function recordOutcome(slug,outcome){
    Array.prototype.forEach.call($('fiche').querySelectorAll('.obtn'),function(b){b.disabled=true;});
    var note=($('notes')&&$('notes').value||'').trim();
    var nc=$('nextcall')&&$('nextcall').value?$('nextcall').value.replace('T',' ')+':00':null;
    var nextSlug=qIndex+1<queue.length?queue[qIndex+1].slug:null;
    api('/admin/api/calling/'+encodeURIComponent(slug)+'/outcome',{method:'POST',body:JSON.stringify({outcome:outcome,note:note,next_call_at:nc})})
      .then(function(){
        toast('✓ '+(OUTCOME_LABEL[outcome]||outcome)+(nextSlug?' — fiche suivante':''));
        loadStats();
        loadQueue(nextSlug).then(function(){ if(!nextSlug)qIndex=Math.min(qIndex,Math.max(queue.length-1,0)); showCurrent(); });
      })
      .catch(function(e){toast('Erreur : '+e.message);Array.prototype.forEach.call($('fiche').querySelectorAll('.obtn'),function(b){b.disabled=false;});});
  }

  // ---- Liste / file d'appel ----
  var LIST_FILTERS=[['all','Tous'],['due','🔴 Rappels dus'],['a_appeler','À appeler'],['rappeler','À rappeler'],['interesse','Intéressé'],['demo_envoyee','Démo envoyée'],['gagne','Gagné'],['perdu','Perdu'],['ne_pas_rappeler','Ne pas rappeler']];
  function loadList(){
    $('view-list').innerHTML='<div class="msg">Chargement de la file…</div>';
    var qs=[];
    if(listFilter==='due')qs.push('due=1');
    else if(listFilter!=='all')qs.push('status='+encodeURIComponent(listFilter));
    api('/admin/api/calling/list'+(qs.length?'?'+qs.join('&'):'')).then(function(r){renderList(r.rows||[]);});
  }
  function renderList(rows){
    var fb='<div class="filterbar">'+LIST_FILTERS.map(function(f){
      return '<button class="fbtn'+(listFilter===f[0]?' on':'')+'" data-f="'+f[0]+'">'+esc(f[1])+'</button>';
    }).join('')+'</div>';
    var body;
    if(!rows.length){body='<div class="msg">Aucun salon dans cette vue.</div>';}
    else{
      body='<div class="tbl-wrap"><table><thead><tr><th>Salon</th><th>Téléphone</th><th>Statut</th><th style="text-align:center">Tent.</th><th>Prochain rappel</th><th></th></tr></thead><tbody>';
      rows.forEach(function(p){
        var due=isDue(p);
        body+='<tr class="qrow" data-open="'+esc(p.slug)+'" title="Ouvrir dans le cockpit">'
          +'<td><span class="salon">'+esc(p.nom)+'</span><div style="font-size:12px;color:var(--muted)">'+esc(p.ville||'')+'</div></td>'
          +'<td>'+(p.telephone?'<a class="lact" data-stop="1" href="tel:'+esc(p.telephone.replace(/\s/g,''))+'">'+esc(p.telephone)+'</a>':'<span style="color:var(--muted)">—</span>')+'</td>'
          +'<td><span class="badge b-'+p.status+'">'+esc(STATUS_LABEL[p.status]||p.status)+'</span></td>'
          +'<td style="text-align:center">'+(p.attempts||0)+'</td>'
          +'<td>'+(p.next_call_at?(due?'<span class="due-dot">● </span>':'')+esc(fmtDate(p.next_call_at))+' <span style="color:var(--muted);font-size:12px">('+esc(fmtWhen(p.next_call_at))+')</span>':'<span style="color:var(--muted)">—</span>')+'</td>'
          +'<td style="white-space:nowrap"><span class="lact">Ouvrir →</span> &nbsp; <span class="lx" data-del="'+esc(p.slug)+'" data-stop="1" title="Retirer">✕</span></td>'
        +'</tr>';
      });
      body+='</tbody></table></div>';
    }
    $('view-list').innerHTML=fb+body;
    Array.prototype.forEach.call($('view-list').querySelectorAll('.fbtn'),function(b){b.onclick=function(){listFilter=b.getAttribute('data-f');loadList();};});
    // Toute la ligne est cliquable → ouvre la fiche dans le cockpit.
    Array.prototype.forEach.call($('view-list').querySelectorAll('tr.qrow'),function(tr){
      tr.onclick=function(e){
        if(e.target.closest('[data-stop]'))return;
        openInCockpit(tr.getAttribute('data-open'));
      };});
    Array.prototype.forEach.call($('view-list').querySelectorAll('[data-del]'),function(el){el.onclick=function(){
      var slug=el.getAttribute('data-del');
      if(!confirm('Retirer ce salon de la file d\'appel ?'))return;
      api('/admin/api/calling/'+encodeURIComponent(slug),{method:'DELETE'}).then(function(){toast('Retiré');loadList();loadStats();loadQueue(queue[qIndex]&&queue[qIndex].slug);});
    };});
  }
  function openInCockpit(slug){
    setView('cockpit');
    loadQueue(slug).then(function(){showCurrent();});
  }

  // ---- Barre d'ajout (recherche salons) ----
  var addT=null;
  $('addq').addEventListener('input',function(){
    var q=this.value.trim();clearTimeout(addT);
    if(q.length<2){$('addres').classList.remove('on');return;}
    addT=setTimeout(function(){
      api('/admin/api/calling/search',{method:'POST',body:JSON.stringify({query:q})}).then(function(r){
        var rs=r.results||[];
        if(!rs.length){$('addres').innerHTML='<div class="ares-it"><span class="al">Aucun salon trouvé</span></div>';$('addres').classList.add('on');return;}
        $('addres').innerHTML=rs.map(function(x){
          return '<div class="ares-it" data-add="'+esc(x.slug)+'"><div><div class="an">'+esc(x.nom)+'</div><div class="al">'+esc([x.code_postal,x.ville].filter(Boolean).join(' '))+(x.telephone?' · '+esc(x.telephone):'')+'</div></div>'+(x.in_calling?'<span class="atag">✓ déjà</span>':'<span class="atag" style="color:var(--gold-d)">＋ ajouter</span>')+'</div>';
        }).join('');
        $('addres').classList.add('on');
        Array.prototype.forEach.call($('addres').querySelectorAll('[data-add]'),function(el){el.onclick=function(){addSalon(el.getAttribute('data-add'));};});
      }).catch(function(){});
    },250);
  });
  document.addEventListener('click',function(e){if(!e.target.closest('.addbox'))$('addres').classList.remove('on');});
  function addSalon(slug){
    $('addres').classList.remove('on');$('addq').value='';
    api('/admin/api/calling/add',{method:'POST',body:JSON.stringify({slug:slug,added_from:'manuel'})}).then(function(j){
      var p=j.prospect||{};
      toast((j.already?'Déjà dans la file':'Ajouté ✓')+(p.telephone?' · '+p.telephone:' · numéro à retrouver'));
      loadStats();
      if(view==='list'){loadList();loadQueue(queue[qIndex]&&queue[qIndex].slug);}
      else openInCockpit(slug);
    }).catch(function(e){toast('Erreur : '+e.message);});
  }

  $('refresh').onclick=function(){
    loadStats();
    if(view==='cockpit'){loadQueue(queue[qIndex]&&queue[qIndex].slug).then(function(){showCurrent();});}
    else loadList();
  };

  // ---- Init ----
  // ?slug=xxx (depuis le Suivi ou une autre page) → ouvre directement cette fiche.
  var startSlug=new URLSearchParams(location.search).get('slug')||null;
  loadStats();
  loadQueue(startSlug||undefined).then(function(){showCurrent();});
})();
</script>
</body>
</html>
