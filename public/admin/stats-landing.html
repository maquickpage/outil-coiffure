<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;padding-bottom:40px;}
  .topbar{background:#1a1a1a;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:14px 0;}
  .topbar-inner{max-width:1100px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:500;font-size:1.3rem;color:#c9a96e;letter-spacing:-.01em;}
  .subtabs{display:inline-flex;gap:4px;background:rgba(255,255,255,.08);padding:3px;border-radius:11px;}
  .subtab{padding:7px 14px;border-radius:8px;font-size:14.5px;font-weight:600;color:rgba(255,255,255,.62);text-decoration:none;white-space:nowrap;transition:color .12s,background .12s;}
  .subtab:hover{color:#fff;}
  .subtab.on{background:#c9a96e;color:#1a1a1a;}
  .spacer{flex:1;}
  .updated{font-size:12px;color:rgba(255,255,255,.6);}
  .hbtn{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .hbtn:hover{background:rgba(255,255,255,.12);}
  main{padding:16px;max-width:1100px;margin:0 auto;}
  .msg{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
  .msg a{color:var(--blue);font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:6px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
  .kpi .v{font-size:26px;font-weight:800;line-height:1;}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .kpi.hot .v{color:var(--hot);}.kpi.ok .v{color:var(--ok);}.kpi.gold .v{color:var(--gold-d);}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:24px 0 10px;}
  .funnel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .frow{display:flex;align-items:center;gap:12px;margin-bottom:11px;}.frow:last-child{margin-bottom:0;}
  .fname{width:170px;flex-shrink:0;font-size:13.5px;font-weight:600;}
  .fname .pct{color:var(--muted);font-weight:600;font-size:12px;margin-left:5px;}
  .fbar-wrap{flex:1;background:#efeada;border-radius:8px;overflow:hidden;height:26px;position:relative;}
  .fbar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-d));border-radius:8px;min-width:2px;transition:width .3s;}
  .fval{position:absolute;right:10px;top:0;height:26px;display:flex;align-items:center;font-size:12.5px;font-weight:700;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .cta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .cta-item{border:1px solid var(--border);border-radius:11px;padding:12px 14px;}
  .cta-item .v{font-size:22px;font-weight:800;}
  .cta-item .l{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600;}
  /* Table leads / engagés traçables */
  .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:11px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:11px 12px;border-bottom:1px solid #f0ece1;vertical-align:middle;}
  tr.row{cursor:pointer;}
  tr.row:hover td{background:#faf8f2;}
  .email{font-weight:700;}
  .loc{font-size:12px;color:var(--muted);}
  .caret{display:inline-block;width:14px;color:var(--muted);font-size:11px;}
  .num{text-align:center;font-variant-numeric:tabular-nums;}
  .when{font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .b-found{background:#dcfce7;color:#14532d;}.b-nf{background:#fef3c7;color:#92400e;}
  .b-demo{background:#e0e7ff;color:#3730a3;}.b-edit{background:#fce7f3;color:#9d174b;}
  /* Bande site démo (leads couverts) : miniature + lien + activité démo */
  .demo-strip{display:flex;align-items:center;gap:8px;margin:8px 0 2px 14px;flex-wrap:wrap;}
  .demo-thumb{height:40px;width:64px;object-fit:cover;object-position:top;border-radius:6px;border:1px solid var(--border);display:block;background:#efeada;}
  .demo-link{font-size:12.5px;color:var(--blue);font-weight:600;text-decoration:none;white-space:nowrap;}
  .demo-link:hover{text-decoration:underline;}
  /* Timeline parcours */
  .detail td{background:#faf8f2;padding:14px 16px;}
  .tl{position:relative;margin:0 0 0 6px;padding-left:16px;border-left:2px solid var(--border);}
  .tl-ev{position:relative;padding:5px 0;font-size:13px;}
  .tl-ev::before{content:'';position:absolute;left:-21px;top:9px;width:9px;height:9px;border-radius:50%;background:var(--gold-d);border:2px solid #faf8f2;}
  .tl-ev.is-submit::before{background:var(--hot);}
  .tl-ev.is-view::before{background:#cbb988;}
  .tl-t{color:var(--muted);font-size:11.5px;margin-left:6px;font-variant-numeric:tabular-nums;}
  .tl-meta{color:var(--cool);}
  .tl-visit{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 0 2px;}
  .tl-none{font-size:13px;color:var(--muted);font-style:italic;}
  .dmono{font-size:12px;color:var(--cool);word-break:break-all;font-family:ui-monospace,Menlo,monospace;margin-top:8px;}
  .dlabel{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;margin-bottom:4px;}
  details.more{margin-top:10px;}
  details.more>summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--cool);list-style:none;padding:6px 0;}
  details.more>summary::-webkit-details-marker{display:none;}
  .bars{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:6px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;}
  .bar-stack{width:100%;max-width:34px;display:flex;flex-direction:column-reverse;height:100px;}
  .bar-seg{width:100%;border-radius:3px 3px 0 0;min-height:0;}
  .bar-seg.v-view{background:#e7d9b0;}
  .bar-seg.v-ready{background:var(--gold);}
  .bar-seg.v-cta{background:var(--gold-d);}
  .bar-day{font-size:10px;color:var(--muted);white-space:nowrap;transform:rotate(-40deg);height:22px;}
  .bar-val{font-size:11px;font-weight:700;color:var(--cool);}
  .legend{display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--cool);flex-wrap:wrap;}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px;}
  @media(max-width:680px){.fname{width:130px;font-size:12px;}.bar-day{font-size:8px;}td,th{padding:9px 8px;}.hide-sm{display:none;}}
</style>

      case 'landing_check_open':return t('e_open');
      case 'landing_check_submit':return t('e_submit');
      case 'landing_check_found':return t('e_found');
      case 'landing_check_notfound':return t('e_nf');
      default:return e.event;
    }
  }
  function evClass(ev){
    if(ev==='landing_check_submit'||ev==='landing_check_found'||ev==='landing_check_notfound')return' is-submit';
    if(ev==='landing_view')return' is-view';return'';
  }
  function timeline(journey){
    if(!journey||!journey.length)return'<div class="dlabel">'+t('jr_title')+'</div><div class="tl-none">'+t('no_journey')+'</div>';
    var maxVisit=journey[journey.length-1].visit||1,lastV=0,out='';
    journey.forEach(function(e){
      if(maxVisit>1&&e.visit&&e.visit!==lastV){lastV=e.visit;out+='<div class="tl-visit">'+t('visit_label',{n:e.visit})+'</div>';}
      out+='<div class="tl-ev'+evClass(e.event)+'"><span class="tl-meta">'+esc(evLabel(e))+'</span><span class="tl-t">'+esc(fmtDate(e.ts))+'</span></div>';
    });
    return'<div class="dlabel">'+t('jr_title')+'</div><div class="tl">'+out+'</div>';
  }
  function detailCell(v,cols){
    return'<tr class="detail"><td colspan="'+cols+'">'+timeline(v.journey)
      +'<div class="dlabel" style="margin-top:10px">'+t('d_ip')+'</div><div class="dmono">'+esc(v.ip||'—')+'</div>'
      +'<div class="dlabel" style="margin-top:8px">'+t('d_ua')+'</div><div class="dmono">'+esc(v.ua||'—')+'</div>'
      +'</td></tr>';
  }
  function stageLabel(st){return st>=5?t('st_submit'):st>=4?t('st_open'):st>=3?t('st_cta'):st>=2?t('st_scroll'):t('st_view');}

  function render(d){
    var f=d.funnel||{},vf=d.visitorFunnel||{},cta=d.cta||{},daily=d.daily||[],leads=d.leads||[],engaged=d.engaged||[];

    var html='<div class="section-title">'+esc(t('sub'))+'</div>';
    html+='<div class="kpis">';
    var real=vf.real||0;
    html+=kpi(real,t('k_real'),t('k_real_sub'),'gold');
    html+=kpi(vf.visitors||0,t('k_uniq'),t('k_uniq_sub'),'');
    html+=kpi(leads.length,t('k_leads'),'','hot');
    html+=kpi(f.found||0,t('k_found'),'','ok');
    html+=kpi(f.notfound||0,t('k_notfound'),'','');
    html+='</div>';

    // Entonnoir par visiteur unique
    // Entonnoir par VRAI visiteur (JS confirmé). Fallback sur les visiteurs
    // bruts tant qu'aucun landing_ready n'existe (données antérieures au beacon).
    var base=real||vf.visitors||0;
    html+='<div class="section-title">'+t('funnel_title')+' · <span style="text-transform:none;font-weight:600">'+t('fn_note')+'</span></div><div class="funnel">';
    html+=frow(real?t('f_real'):t('f_uniq'),base,base,base);
    html+=frow(t('f_scroll'),vf.scroll50||0,base,base);
    html+=frow(t('f_cta'),vf.cta||0,base,base);
    html+=frow(t('f_open'),vf.open||0,base,base);
    html+=frow(t('f_submit'),vf.submit||0,base,base);
    html+='</div>';

    // === D'OÙ VIENNENT LES VRAIS VISITEURS ===
    var sources=d.sources||[];
    if(sources.length){
      var smax=sources[0].n||1;
      html+='<div class="section-title">'+t('src_title')+'</div><div class="funnel">';
      sources.slice(0,12).forEach(function(s){
        var label=s.source==='direct'?t('src_direct'):(s.source.indexOf('src:')===0?'?src='+s.source.slice(4):s.source);
        html+=frow(label,s.n,smax,real);
      });
      html+='</div>';
    }

    // === LEADS TRAÇABLES (email → parcours) ===
    html+='<div class="section-title">'+t('leads_title')+' ('+leads.length+')</div>';
    if(!leads.length)html+='<div class="card"><div class="msg" style="padding:20px">'+t('leads_none')+'</div></div>';
    else{
      html+='<div class="tbl-wrap"><table><thead><tr>'
        +'<th>'+t('th_email')+'</th><th>'+t('th_status')+'</th>'
        +'<th class="num">'+t('th_events')+'</th><th class="num hide-sm">'+t('th_scroll')+'</th>'
        +'<th>'+t('th_seen')+'</th></tr></thead><tbody>';
      leads.forEach(function(l,i){
        var open=expLead[i];
        var extra=(l.emails&&l.emails.length>1)?' <span class="loc">'+t('multi',{n:l.emails.length-1})+'</span>':'';
        var loc=[l.salon,l.ville].filter(Boolean).map(esc).join(' · ');
        if(l.visits>1)loc+=(loc?' · ':'')+esc(t('visits_n',{n:l.visits}));
        if(l.source)loc+=(loc?' · ':'')+esc(t('via',{s:l.source==='direct'?t('src_direct'):l.source}));
        var badge=l.found?'<span class="badge b-found">'+t('s_found')+'</span>':'<span class="badge b-nf">'+t('s_nf')+'</span>';
        // Bande site démo (leads couverts) : miniature + lien + activité démo.
        // stopPropagation : cliquer un lien ne doit pas replier/déplier la ligne.
        var demoStrip='';
        if(l.demoUrl){
          var dbadges='';
          if(l.demo){
            if(l.demo.opened)dbadges+=' <span class="badge b-demo">'+t('b_opened')+'</span>';
            if(l.demo.editorOpened)dbadges+=' <span class="badge b-demo">'+t('b_editor')+'</span>';
            if(l.demo.edited)dbadges+=' <span class="badge b-edit">'+t('b_edited')+'</span>';
          }
          demoStrip='<div class="demo-strip">'
            +(l.screenshot?'<a href="'+esc(l.demoUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()"><img class="demo-thumb" src="'+esc(l.screenshot)+'" alt="" loading="lazy"></a>':'')
            +'<a class="demo-link" href="'+esc(l.demoUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+t('view_site')+'</a>'
            +dbadges+'</div>';
        }
        html+='<tr class="row" data-lead="'+i+'">'
          +'<td><span class="caret">'+(open?'▾':'▸')+'</span><span class="email">'+esc(l.email)+'</span>'+extra+(loc?'<div class="loc" style="margin-left:14px">'+loc+'</div>':'')+demoStrip+'</td>'
          +'<td>'+badge+'</td>'
          +'<td class="num">'+(l.preTracking?'—':(l.events||0))+'</td>'
          +'<td class="num hide-sm">'+(l.scrollMax?l.scrollMax+'%':'—')+'</td>'
          +'<td class="when" title="'+esc(l.last)+'">'+fmtDate(l.last)+'<div style="font-size:11px">'+fmtWhen(l.last)+'</div></td>'
          +'</tr>';
        if(open)html+=detailCell(l,5);
      });
      html+='</tbody></table></div>';
    }

    // === ENGAGÉS SANS ENVOI (near-miss) ===
    var engTotal=d.engagedTotal||engaged.length;
    if(engaged.length){
      html+='<div class="section-title">'+t('eng_title')+' ('+engTotal+') · <span style="text-transform:none;font-weight:600">'+t('eng_sub')+'</span></div>';
      html+='<div class="tbl-wrap"><table><thead><tr>'
        +'<th>'+t('th_visitor')+'</th><th>'+t('th_stage')+'</th>'
        +'<th class="num">'+t('th_events')+'</th><th class="num hide-sm">'+t('th_scroll')+'</th>'
        +'<th>'+t('th_seen')+'</th></tr></thead><tbody>';
      engaged.forEach(function(v,i){
        var open=expEng[i];
        html+='<tr class="row" data-eng="'+i+'">'
          +'<td><span class="caret">'+(open?'▾':'▸')+'</span><span class="dmono" style="font-size:12.5px">'+esc(v.ip||'—')+'</span></td>'
          +'<td>'+esc(stageLabel(v.stage))+(v.visits>1?' <span class="loc">· '+esc(t('visits_n',{n:v.visits}))+'</span>':'')+(v.source?' <span class="loc">· '+esc(t('via',{s:v.source}))+'</span>':'')+'</td>'
          +'<td class="num">'+(v.events||0)+'</td>'
          +'<td class="num hide-sm">'+(v.scrollMax?v.scrollMax+'%':'—')+'</td>'
          +'<td class="when" title="'+esc(v.last)+'">'+fmtDate(v.last)+'<div style="font-size:11px">'+fmtWhen(v.last)+'</div></td>'
          +'</tr>';
        if(open)html+=detailCell(v,5);
      });
      html+='</tbody></table></div>';
    }

    // === Répartition CTA ===
    html+='<div class="section-title">'+t('cta_title')+'</div><div class="card"><div class="cta-grid">';
    [['nav','c_nav'],['hero','c_hero'],['coverage','c_coverage'],['pricing','c_pricing']].forEach(function(x){
      html+='<div class="cta-item"><div class="v">'+(cta[x[0]]||0)+'</div><div class="l">'+esc(t(x[1]))+'</div></div>';
    });
    html+='</div></div>';

    // === Tendance 14 jours ===
    if(daily.length){
      var maxV=1;daily.forEach(function(r){if((r.view||0)>maxV)maxV=r.view||0;});
      html+='<div class="section-title">'+t('trend_title')+'</div><div class="card"><div class="bars">';
      daily.forEach(function(r){
        var vh=Math.round((r.view||0)/maxV*100),rh=Math.round((r.ready||0)/maxV*100),ch=Math.round((r.cta||0)/maxV*100);
        var dd=(r.day||'').slice(5).replace('-','/');
        html+='<div class="bar-col" title="'+esc(r.day)+'">'
          +'<div class="bar-val">'+(r.ready||0)+'</div>'
          +'<div class="bar-stack"><div class="bar-seg v-view" style="height:'+vh+'%"></div><div class="bar-seg v-ready" style="height:'+rh+'%"></div><div class="bar-seg v-cta" style="height:'+ch+'%"></div></div>'
          +'<div class="bar-day">'+esc(dd)+'</div></div>';
      });
      html+='</div><div class="legend"><span><i style="background:#e7d9b0"></i>'+t('lg_view')+'</span><span><i style="background:#C8A24B"></i>'+t('lg_real')+'</span><span><i style="background:#A8842F"></i>'+t('lg_cta')+'</span></div></div>';
    }

    if(!(f.view||vf.visitors||leads.length)){html='<div class="msg">'+t('none')+'</div>';}
    $('content').innerHTML=html;

    Array.prototype.forEach.call(document.querySelectorAll('tr.row[data-lead]'),function(tr){
      tr.onclick=function(){var i=tr.getAttribute('data-lead');expLead[i]=!expLead[i];render(DATA);};});
    Array.prototype.forEach.call(document.querySelectorAll('tr.row[data-eng]'),function(tr){
      tr.onclick=function(){var i=tr.getAttribute('data-eng');expEng[i]=!expEng[i];render(DATA);};});
  }

  function load(){
    $('updated').textContent='…';
    fetch(JSON_URL+'?t='+Date.now(),{credentials:'same-origin',cache:'no-store'}).then(function(r){
      if(r.status===401||r.status===302||r.redirected)throw new Error('auth');
      if(!r.ok)throw new Error('http '+r.status);
      return r.json();
    }).then(function(d){
      DATA=d;var n=new Date();
      $('updated').textContent=t('maj')+' '+n.getHours()+'h'+('0'+n.getMinutes()).slice(-2);
      render(d);
    }).catch(function(e){
      if(e.message==='auth')$('content').innerHTML='<div class="msg">'+t('auth')+'<br><br><a href="/admin/login">'+t('signin')+'</a></div>';
      else $('content').innerHTML='<div class="msg">'+t('err')+esc(e.message)+'</div>';
      $('updated').textContent='';
    });
  }

  Array.prototype.forEach.call(document.querySelectorAll('.lang-btn'),function(b){
    b.addEventListener('click',function(){setLang(b.dataset.lang);});
  });
  $('refresh').onclick=load;
  applyStatic();
  load();
})();
</script>
</body>
</html>
