<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MaQuickPage · Photos IA</title>
<link rel="stylesheet" href="/admin/admin-nav.css">
<link rel="icon" type="image/png" href="/admin/picto-coif.png">
<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;padding-bottom:60px;}
  header{position:sticky;top:0;z-index:20;}
  .topbar{background:#1a1a1a;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:14px 0;}
  .topbar-inner{max-width:1200px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-weight:500;font-size:1.3rem;color:#c9a96e;letter-spacing:-.01em;}
  .spacer{flex:1;}
  .hbtn{border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .hbtn:hover{background:rgba(255,255,255,.12);}
  .hbtn.gold{background:#c9a96e;color:#1a1a1a;border-color:#c9a96e;}
  main{padding:16px;max-width:1200px;margin:0 auto;}
  .msg{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
  .msg a{color:var(--blue);font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
  .kpi .v{font-size:22px;font-weight:800;line-height:1;}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600;}
  .kpi.ok .v{color:var(--ok);}.kpi.gold .v{color:var(--gold-d);}.kpi.hot .v{color:var(--hot);}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
  .panel h3{margin:0 0 10px;font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .btn{border:1.5px solid var(--border);background:#fff;color:var(--ink);padding:8px 16px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;}
  .btn:hover{border-color:var(--gold);}
  .btn.primary{background:var(--gold);border-color:var(--gold);color:#fff;}
  .btn.primary:hover{background:var(--gold-d);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn.sm{padding:5px 10px;font-size:12.5px;border-radius:7px;}
  .batchrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .jobbar{margin-top:10px;font-size:13.5px;color:var(--cool);display:none;}
  .jobbar.on{display:block;}
  .jobbar .prog{height:8px;background:#efeada;border-radius:5px;overflow:hidden;margin-top:6px;}
  .jobbar .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-d));transition:width .4s;}
  details.criteria{margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;}
  details.criteria>summary{list-style:none;cursor:pointer;padding:13px 16px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;}
  details.criteria>summary::-webkit-details-marker{display:none;}
  details.criteria[open]>summary{border-bottom:1px solid var(--border);}
  .crit-body{padding:14px 16px;}
  .crit-row{display:grid;grid-template-columns:190px 64px 1fr 30px;gap:8px;margin-bottom:8px;align-items:start;}
  .crit-row input,.crit-row textarea{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
  .crit-row textarea{resize:vertical;min-height:38px;}
  .crit-del{border:none;background:none;color:var(--hot);font-size:17px;cursor:pointer;padding-top:6px;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .tab{border:1.5px solid var(--border);background:#fff;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;color:var(--cool);}
  .tab.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
  .card-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .card-head .nm{font-weight:800;font-size:16px;}
  .card-head .vl{color:var(--muted);font-size:13px;}
  .card-head .meta{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap;}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .b-pick{background:#fdf3dc;color:#8a6914;}
  .b-none{background:#eef0f2;color:#5b6470;}
  .b-applied{background:#dcfce7;color:#14532d;}
  .b-good{background:#dcfce7;color:#14532d;}
  .b-bad{background:#fde2e0;color:#9b2c22;}
  .b-err{background:#fde2e0;color:#9b2c22;}
  .reason{font-size:13.5px;color:var(--cool);margin:6px 0 10px;font-style:italic;}
  .strip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;}
  .ph{position:relative;flex:0 0 auto;width:132px;height:99px;border-radius:9px;overflow:hidden;border:2.5px solid transparent;cursor:zoom-in;background:#eee;}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;}
  .ph.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,162,75,.35);}
  .ph .star{position:absolute;top:4px;left:5px;font-size:15px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
  .ph .sc{position:absolute;bottom:4px;right:5px;background:rgba(0,0,0,.65);color:#fff;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;}
  .ph .ld{position:absolute;bottom:4px;left:5px;background:rgba(192,57,43,.85);color:#fff;border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700;}
  .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .fb{display:inline-flex;gap:4px;}
  .fbtn{border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:6px 11px;font-size:15px;cursor:pointer;}
  .fbtn:hover{border-color:var(--gold);}
  .fbtn.on-good{background:#dcfce7;border-color:#16a34a;}
  .fbtn.on-bad{background:#fde2e0;border-color:#dc2626;}
  .cmt{display:none;margin-top:8px;gap:8px;}
  .cmt.on{display:flex;}
  .cmt input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;}
  select.pos{padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;}
  .tlink{color:var(--blue);text-decoration:none;font-weight:600;font-size:13px;}
  .more{display:block;margin:10px auto 0;}
  /* Lightbox */
  #lb{position:fixed;inset:0;background:rgba(10,10,10,.88);display:none;align-items:center;justify-content:center;z-index:100;cursor:zoom-out;padding:20px;}
  #lb.on{display:flex;}
  #lb img{max-width:96vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:600;transition:transform .25s;z-index:120;max-width:90vw;}
  #toast.on{transform:translateX(-50%) translateY(0);}
  @media(max-width:680px){.crit-row{grid-template-columns:1fr 60px;}.crit-row textarea{grid-column:1/-1;}}
  /* Sélecteur de vue (IA / Manuel) */
  .vtabs{display:flex;gap:6px;margin-bottom:16px;background:#ece8de;padding:5px;border-radius:13px;}
  .vtab{flex:1;border:none;background:transparent;padding:11px 14px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;color:var(--cool);}
  .vtab.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.09);}
  /* Grille de sélection manuelle */
  .mbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:10px 0 4px;}
  .mit{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;transition:box-shadow .15s,border-color .15s;}
  .mit.galon{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,162,75,.35);}
  .mim{position:relative;height:108px;background:#eee;cursor:zoom-in;}
  .mim img{width:100%;height:100%;object-fit:cover;display:block;}
  .mim.heronow{outline:3px solid var(--ok);outline-offset:-3px;}
  .mtag{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.65);color:#fff;border-radius:6px;padding:1px 7px;font-size:10.5px;font-weight:700;}
  .mtag.ld{top:auto;bottom:5px;background:rgba(192,57,43,.85);}
  .mtag.star{background:rgba(200,162,75,.92);}
  .mtag.ok{background:rgba(19,138,54,.92);}
  .macts{display:flex;gap:6px;padding:7px;align-items:center;}
  .mhero-btn{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:7px;padding:6px 8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink);}
  .mhero-btn:hover{border-color:var(--gold);background:#fdf3dc;}
  .mhero-btn.done{border-color:var(--ok);background:#dcfce7;color:#14532d;}
  .mhero-btn:disabled{opacity:.55;cursor:default;}
  .mgal{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--cool);cursor:pointer;white-space:nowrap;user-select:none;}
  .mgal input{width:15px;height:15px;cursor:pointer;}
  /* Plein écran navigable (vue manuelle) */
  body.fs-lock{overflow:hidden;}
  .mfs{position:fixed;inset:0;background:rgba(8,8,8,.94);z-index:110;display:none;flex-direction:column;}
  .mfs.on{display:flex;}
  .mfs-stage{flex:1 1 auto;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0;touch-action:none;}
  .mfs-stage img{max-width:94vw;max-height:100%;object-fit:contain;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.55);user-select:none;-webkit-user-drag:none;}
  .mfs-close{position:absolute;top:12px;right:14px;z-index:6;width:42px;height:42px;border-radius:50%;border:none;background:rgba(0,0,0,.5);color:#fff;font-size:19px;cursor:pointer;}
  .mfs-close:hover{background:rgba(0,0,0,.72);}
  .mfs-nav{position:absolute;z-index:6;border:none;background:rgba(0,0,0,.42);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;line-height:1;}
  .mfs-nav:hover{background:rgba(0,0,0,.7);}
  .mfs-nav.lr{width:54px;height:54px;font-size:32px;top:50%;transform:translateY(-50%);}
  .mfs-nav.left{left:10px;}
  .mfs-nav.right{right:10px;}
  .mfs-nav.ud{width:46px;height:46px;font-size:23px;left:50%;transform:translateX(-50%);}
  .mfs-nav.up{top:12px;}
  .mfs-nav.down{bottom:92px;}
  .mfs-bar{flex:0 0 auto;background:#141414;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}
  .mfs-meta{font-size:13px;color:#cfcabd;text-align:center;}
  .mfs-acts{display:flex;align-items:center;gap:16px;}
  .mfs-hero{border:1.5px solid var(--gold);background:var(--gold);color:#1a1a1a;border-radius:9px;padding:10px 18px;font-size:15px;font-weight:800;cursor:pointer;}
  .mfs-hero:hover{background:var(--gold-d);border-color:var(--gold-d);}
  .mfs-hero.done{background:var(--ok);border-color:var(--ok);color:#fff;}
  .mfs-hero:disabled{opacity:.6;cursor:default;}
  .mfs-gal{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;user-select:none;}
  .mfs-gal input{width:20px;height:20px;cursor:pointer;}
  @media(max-width:680px){
    .mfs-nav.lr{width:46px;height:46px;font-size:27px;}
    .mfs-nav.down{bottom:104px;}
    .mfs-hero{font-size:14px;padding:9px 15px;}
    .mfs-stage img{max-width:100vw;}
  }
</style>
</head>
<body>
<header class="anav">
  <div class="anav-inner">
    <a class="anav-brand" href="/admin/"><img class="anav-logo" src="/admin/picto-coif.png" alt=""><span>Outil coiffure</span></a>
    <nav class="anav-tabs">
      <a class="anav-tab" data-path="/admin" href="/admin/">Tableau de bord</a>
      <a class="anav-tab" data-path="/admin/photos.html" href="/admin/photos.html">Photos</a>
      <a class="anav-tab" data-path="/admin/stats" href="/admin/stats.html">Suivi</a>
      <a class="anav-tab" data-path="/admin/nouveau-salon.html" href="/admin/nouveau-salon.html">➕ Nouveau salon</a>
      <a class="anav-tab" data-path="/admin/calling.html" href="/admin/calling.html">☎️ Prospection</a>
    </nav>
    <span class="anav-spacer"></span>
    <div class="anav-right">
      <span class="lang-switcher">
        <button class="lang-btn" data-lang="fr" type="button">FR</button>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="zh" type="button">中</button>
      </span>
      <button class="anav-logout" id="anav-logout" type="button">Déconnexion</button>
    </div>
  </div>
</header>
<script src="/admin/admin-nav.js?v=20260713-tracking"></script>
<main>
  <div class="vtabs">
    <button class="vtab active" data-v="ia">🤖 Sélection IA</button>
    <button class="vtab" data-v="manual">✋ Sélection manuelle</button>
  </div>
  <div id="content"><div class="msg">Chargement…</div></div>
</main>

<div id="lb" onclick="this.classList.remove('on')"><img id="lb-img" src="" alt=""></div>
<div id="mfs" class="mfs" aria-hidden="true">
  <button class="mfs-close" id="mfs-close" title="Fermer (Échap)">✕</button>
  <button class="mfs-nav lr left" id="mfs-nav-left" title="Photo précédente (←)">‹</button>
  <button class="mfs-nav lr right" id="mfs-nav-right" title="Photo suivante (→)">›</button>
  <button class="mfs-nav ud up" id="mfs-nav-up" title="Salon précédent (↑)">↑</button>
  <button class="mfs-nav ud down" id="mfs-nav-down" title="Salon suivant (↓)">↓</button>
  <div class="mfs-stage" id="mfs-stage"><img id="mfs-img" src="" alt=""></div>
  <div class="mfs-bar">
    <span class="mfs-meta" id="mfs-meta"></span>
    <div class="mfs-acts">
      <button class="mfs-hero" id="mfs-hero">⭐ Définir héros</button>
      <label class="mfs-gal"><input type="checkbox" id="mfs-gal-input"> Galerie</label>
      <label class="mfs-gal" title="En cliquant Héros, basculer les autres photos en galerie (en tête)"><input type="checkbox" id="mfs-autogal"> Auto-galerie</label>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
(function(){
'use strict';
var $=function(id){return document.getElementById(id);};
var stats=null, criteria=null, filter='feedback_pending', rows=[], total=0, offset=0, LIMIT=15;
var jobTimer=null, currentJob=null;
var view='ia';
var mState={groups:null, groupId:null, total:0, offset:0, salons:[], sel:{}, autoGallery:true};
var M_LIMIT=8;
function cap(s){return s?String(s).charAt(0).toUpperCase()+String(s).slice(1):s;}

function esc(s){return s==null?'':String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m,ms){var t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('on');},ms||3200);}
function api(path,opts){
  return fetch(path,Object.assign({credentials:'same-origin'},opts||{})).then(function(r){
    if(r.status===401)throw new Error('auth');
    return r.json().then(function(j){if(!r.ok)throw new Error(j.error||('http '+r.status));return j;});
  });
}

function authMsg(){
  $('content').innerHTML='<div class="msg">Connecte-toi d\'abord à l\'admin, puis recharge cette page.<br><br><a href="/admin/login">→ Se connecter</a></div>';
}

// ============ RENDER ============
function kpi(v,l,cls){return '<div class="kpi '+(cls||'')+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}

function renderShell(){
  var h='';
  // KPIs
  h+='<div class="kpis">';
  h+=kpi(stats.salons_in_db_with_photos.toLocaleString('fr-FR'),'Salons en BDD avec photos','');
  h+=kpi(stats.photos_total.toLocaleString('fr-FR'),'Photos indexées','');
  h+=kpi(stats.scorings_with_pick,'Choix IA faits','gold');
  h+=kpi(stats.scorings_no_suitable,'« Aucune ne convient »','');
  h+=kpi(stats.heroes_applied,'Héros appliqués','ok');
  h+=kpi(stats.feedback_good+' 👍 / '+stats.feedback_bad+' 👎','Feedbacks','');
  h+=kpi(stats.total_cost_eur.toFixed(2)+' €','Coût IA total','');
  h+='</div>';

  if(!stats.ai_configured){
    h+='<div class="panel" style="border-color:#dc2626;color:#9b2c22"><b>⚠ Azure OpenAI non configuré</b> — le scoring est désactivé (la navigation photos marche quand même).</div>';
  }
  if(stats.photos_total===0){
    h+='<div class="panel"><b>Aucune photo indexée.</b> L\'upload des renditions est peut-être encore en cours. <button class="btn sm" id="btn-import">Importer l\'index maintenant</button></div>';
  }

  // Batch
  h+='<div class="panel"><h3>Scorer des salons (IA choisit le meilleur héro)</h3><div class="batchrow">';
  h+='<button class="btn primary" data-batch="1">Scorer 1 salon</button>';
  h+='<button class="btn" data-batch="10">Scorer 10</button>';
  h+='<button class="btn" data-batch="100">Scorer 100</button>';
  h+='<span style="font-size:12.5px;color:var(--muted)">~0,01-0,02 €/salon · priorité aux salons présents en BDD jamais scorés</span>';
  h+='</div><div class="jobbar" id="jobbar"><span id="jobtxt"></span><div class="prog"><i id="jobprog" style="width:0%"></i></div></div></div>';

  // Critères
  h+='<details class="criteria"><summary>⚙️ Critères de sélection (version active : '+esc(criteria?criteria.label:'—')+')</summary><div class="crit-body" id="crit-body"></div></details>';

  // Tabs
  var tabs=[['feedback_pending','À valider'],['pick','Choix fait'],['no_suitable','Aucune ne convient'],['applied','Héros appliqués'],['errors','Erreurs'],['all','Tous']];
  h+='<div class="tabs">'+tabs.map(function(t){return '<button class="tab'+(filter===t[0]?' active':'')+'" data-f="'+t[0]+'">'+t[1]+'</button>';}).join('')+'</div>';

  h+='<div id="results"></div>';
  $('content').innerHTML=h;

  renderCriteria();
  renderResults(true);

  Array.prototype.forEach.call(document.querySelectorAll('[data-batch]'),function(b){
    b.onclick=function(){launchBatch(parseInt(b.getAttribute('data-batch'),10));};
    if(!stats.ai_configured)b.disabled=true;
  });
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(b){
    b.onclick=function(){filter=b.getAttribute('data-f');offset=0;rows=[];loadResults().then(function(){renderShell();});};
  });
  var bi=$('btn-import');if(bi)bi.onclick=function(){bi.disabled=true;api('/admin/api/picker/import-index',{method:'POST'}).then(function(r){toast('Index importé : '+r.salons+' salons, '+r.photos+' photos');return refreshAll();}).catch(function(e){toast('Erreur : '+e.message);bi.disabled=false;});};
}

function renderCriteria(){
  var el=$('crit-body');if(!el)return;
  var rub=(criteria&&criteria.rubric)||[];
  var h='<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">Modifier crée une <b>nouvelle version active</b> (les anciens scorings gardent la leur). Les poids doivent totaliser ~100.</div>';
  rub.forEach(function(c,i){
    h+='<div class="crit-row" data-i="'+i+'">'
      +'<input class="c-name" value="'+esc(c.name)+'" placeholder="nom_du_critère">'
      +'<input class="c-w" type="number" value="'+esc(c.weight)+'" min="0" max="100">'
      +'<textarea class="c-desc" rows="2">'+esc(c.description)+'</textarea>'
      +'<button class="crit-del" title="Supprimer">✕</button></div>';
  });
  h+='<div style="display:flex;gap:8px;margin-top:10px"><button class="btn sm" id="crit-add">+ Ajouter un critère</button><span class="spacer" style="flex:1"></span><button class="btn primary sm" id="crit-save">💾 Enregistrer (nouvelle version)</button></div>';
  el.innerHTML=h;
  el.querySelectorAll('.crit-del').forEach(function(b){b.onclick=function(){b.closest('.crit-row').remove();};});
  $('crit-add').onclick=function(){
    var d=document.createElement('div');d.className='crit-row';

        +(p.lowdef?'<span class="ld">basse déf</span>':'')

    });

  }

  h+='<span class="fb"><button class="fbtn'+(r.feedback_rating==='good'?' on-good':'')+'" data-fb="good" title="Bon choix">👍</button>'
    +'<button class="fbtn'+(r.feedback_rating==='bad'?' on-bad':'')+'" data-fb="bad" title="Mauvais choix">👎</button></span>';

function renderResults(reset){
  var el=$('results');if(!el)return;
  var h=rows.map(cardHtml).join('');
  if(!rows.length)h='<div class="msg">Aucun résultat pour ce filtre.</div>';
  else if(rows.length<total)h+='<button class="btn more" id="more">Charger plus ('+rows.length+'/'+total+')</button>';
  el.innerHTML=h;
  bindCards();
  var m=$('more');if(m)m.onclick=function(){offset+=LIMIT;loadResults().then(function(){renderResults();});};
}

function bindCards(){
  document.querySelectorAll('.card').forEach(function(card){
    var sid=parseInt(card.getAttribute('data-sid'),10);
    var r=rows.find(function(x){return x.scoring_id===sid;});
    card.querySelectorAll('.ph').forEach(function(ph){
      ph.onclick=function(){$('lb-img').src=ph.getAttribute('data-lg');$('lb').classList.add('on');};
    });
    card.querySelectorAll('[data-fb]').forEach(function(b){
      b.onclick=function(){
        var rating=b.getAttribute('data-fb');
        var cmt=card.querySelector('.cmt');
        cmt.classList.add('on');
        cmt.dataset.rating=rating;
        cmt.querySelector('input').focus();
        // envoi immédiat sans commentaire si re-clic
        if(cmt.dataset.armed===rating){sendFeedback(sid,rating,'',card);}
        cmt.dataset.armed=rating;
      };
    });
    var cmt=card.querySelector('.cmt');
    if(cmt){
      cmt.querySelector('button').onclick=function(){
        sendFeedback(sid,cmt.dataset.rating||'good',cmt.querySelector('input').value.trim(),card);
      };
      cmt.querySelector('input').addEventListener('keydown',function(e){
        if(e.key==='Enter')sendFeedback(sid,cmt.dataset.rating||'good',this.value.trim(),card);
      });
    }
    var ap=card.querySelector('[data-apply]');
    if(ap){
      ap.onclick=function(){
        ap.disabled=true;ap.textContent='Application…';
        var pos=card.querySelector('select.pos').value;
        api('/admin/api/picker/apply-hero',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scoring_id:sid,position:pos})})
          .then(function(res){toast('Héro appliqué ✓ — screenshot en cours de recapture');r.applied_hero_at=new Date().toISOString();renderResults();refreshStats();})
          .catch(function(e){toast('Erreur : '+e.message);ap.disabled=false;ap.textContent='Appliquer comme héro';});
      };
    }
  });
}

function sendFeedback(sid,rating,comment,card){
  api('/admin/api/picker/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scoring_id:sid,rating:rating,comment:comment})})
    .then(function(){
      toast(comment?'Feedback + commentaire enregistrés ✓ (RAG enrichi)':'Feedback enregistré ✓');
      var r=rows.find(function(x){return x.scoring_id===sid;});
      if(r)r.feedback_rating=rating;
      renderResults();refreshStats();
    })
    .catch(function(e){toast('Erreur : '+e.message);});
}

// ============ BATCH ============
function launchBatch(size){
  api('/admin/api/picker/batch?size='+size,{method:'POST'}).then(function(j){
    currentJob=j.job_id;
    $('jobbar').classList.add('on');
    pollJob(size);
    toast('Scoring lancé ('+size+' salon'+(size>1?'s':'')+')');
  }).catch(function(e){toast('Erreur : '+e.message);});
}
function pollJob(size){
  clearInterval(jobTimer);
  jobTimer=setInterval(function(){
    api('/admin/api/picker/batch/'+currentJob).then(function(j){
      var pct=Math.round(j.done/j.size*100);
      $('jobtxt').textContent='Scoring '+j.done+'/'+j.size+' — ✓ '+j.success+' choix · ∅ '+j.no_suitable+' aucune · ⚠ '+j.errors+' err · '+(j.cost_total_eur*100).toFixed(1)+' c€'+(j.exhausted?' · plus de salons à scorer':'');
      $('jobprog').style.width=pct+'%';
      if(j.finished_at){
        clearInterval(jobTimer);
        toast('Batch terminé : '+j.success+' choix faits'+(j.no_suitable?', '+j.no_suitable+' sans photo adaptée':''));
        offset=0;refreshAll();
      }
    }).catch(function(){clearInterval(jobTimer);});
  },2500);
}

function mCard(s){
  var h='<div class="card" data-slug="'+esc(s.slug)+'">';
  h+='<div class="card-head"><span class="nm">'+esc(s.nom)+'</span><span class="vl">'+esc(s.ville||'')+'</span>';
  if(s.hero_applied)h+='<span class="badge b-applied">✓ héros perso</span>';
  if(s.gallery_custom)h+='<span class="badge b-good">galerie ×'+s.gallery_custom+'</span>';
  h+='<span class="meta"><a class="tlink" href="https://maquickpage.fr/preview/'+encodeURIComponent(s.slug)+'" target="_blank" rel="noopener">Voir la démo ↗</a></span></div>';

  h+='<div class="mgrid">';

    var galSel=!!(mState.sel[s.slug]&&mState.sel[s.slug][p.photo_id]);

      +'<div class="mim'+(isHero?' heronow':'')+'" data-lg="'+esc(p.lg)+'"><img loading="lazy" src="'+esc(p.th)+'" alt="">'
      +(isHero?'<span class="mtag ok">✓ héros</span>':(isAi?'<span class="mtag star">⭐ IA</span>':''))
      +(p.lowdef?'<span class="mtag ld">basse déf</span>':'')
      +'</div>'
      +'<div class="macts"><button class="mhero-btn'+(isHero?' done':'')+'" data-hero="'+esc(p.photo_id)+'">'+(isHero?'✓ Héros':'Héros')+'</button>'
      +'<label class="mgal"><input type="checkbox" data-gal="'+esc(p.photo_id)+'"'+(galSel?' checked':'')+'>Galerie</label></div>'
      +'</div>';

    +'<select class="pos m-pos"><option value="centre">Cadrage centre</option><option value="haut">Cadrage haut</option><option value="bas">Cadrage bas</option></select>'
    +'<button class="btn primary sm" data-galmode="replace">Remplacer la galerie (0)</button>'
    +'<button class="btn sm" data-galmode="append">＋ Ajouter (0)</button>'

function renderManualList(){
  var el=$('m-list');if(!el)return;
  var info=$('m-srcinfo');if(info)info.textContent=mState.total+' salon'+(mState.total>1?'s':'')+' avec photos';
  if(!mState.salons.length){el.innerHTML='<div class="msg">Aucun salon avec photos pour cette région.</div>';return;}
  var h=mState.salons.map(mCard).join('');
  if(mState.salons.length<mState.total)h+='<button class="btn more" id="m-more">Charger plus ('+mState.salons.length+'/'+mState.total+')</button>';
  el.innerHTML=h;
  document.querySelectorAll('#m-list .card').forEach(bindManualCard);
  var m=$('m-more');if(m)m.onclick=function(){mState.offset+=M_LIMIT;loadManualSalons();};
}
function mSetStatus(card,t){var s=card.querySelector('.m-status');if(s)s.textContent=t;}
function mUpdateGalBtns(card,slug){
  var bag=mState.sel[slug]||{};
  var n=Object.keys(bag).filter(function(k){return bag[k];}).length;
  var over=n>12;
  var rep=card.querySelector('[data-galmode="replace"]'), add=card.querySelector('[data-galmode="append"]');
  if(rep){rep.textContent=over?('Max 12 ('+n+')'):('Remplacer la galerie ('+n+')');rep.disabled=(n===0||over);}
  if(add){add.textContent=over?('Max 12 ('+n+')'):('＋ Ajouter ('+n+')');add.disabled=(n===0||over);}
}
function mCardNode(slug){var found=null;document.querySelectorAll('#m-list .card').forEach(function(c){if(c.getAttribute('data-slug')===slug)found=c;});return found;}
function mRerenderCard(slug){
  var salon=mState.salons.find(function(x){return x.slug===slug;});
  var node=mCardNode(slug);
  if(!salon||!node)return;
  var tmp=document.createElement('div');tmp.innerHTML=mCard(salon);
  var fresh=tmp.firstChild;
  node.parentNode.replaceChild(fresh,node);
  bindManualCard(fresh);
}
function mSetAutoGallery(v){
  mState.autoGallery=!!v;
  var a=$('m-autogal'); if(a)a.checked=mState.autoGallery;
  var b=$('mfs-autogal'); if(b)b.checked=mState.autoGallery;
}
// Applique le héros, et si l'option auto-galerie est active, bascule les autres
// photos du salon en galerie (en tête, max 12). Renvoie une promesse ; ne rejette
// que si le héros échoue (l'échec galerie est non bloquant).
function mApplyHero(slug,photoId,position){
  var salon=mState.salons.find(function(x){return x.slug===slug;});
  return api('/admin/api/picker/salon/'+encodeURIComponent(slug)+'/hero',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_id:photoId,position:position})})
    .then(function(){
      if(salon){salon.hero_applied=true;salon._heroPid=photoId;}
      if(mState.autoGallery && salon && salon.photos){
        var others=salon.photos.filter(function(p){return p.photo_id!==photoId;}).map(function(p){return p.photo_id;}).slice(0,12);
        if(others.length){
          return api('/admin/api/picker/salon/'+encodeURIComponent(slug)+'/gallery',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_ids:others,mode:'append'})})
            .then(function(r){
              if(salon)salon.gallery_custom=r.count;
              if(mState.sel[slug])mState.sel[slug]={};
              toast('Héros + galerie : '+r.added+' photo'+(r.added>1?'s':'')+' en tête ✓');
              return r;
            }, function(e){ toast('Héros OK · galerie auto échouée : '+e.message); return null; });
        }
      }
      toast('Héros appliqué ✓ — démo à jour, screenshot en recapture');
      return null;
    });
}
function bindManualCard(card){
  var slug=card.getAttribute('data-slug');
  var salon=mState.salons.find(function(x){return x.slug===slug;});
  if(!salon)return;
  if(!mState.sel[slug])mState.sel[slug]={};
  card.querySelectorAll('.mit').forEach(function(it){
    var pid=it.getAttribute('data-pid'), im=it.querySelector('.mim');
    if(im)im.onclick=function(){openFs(slug,pid);};
  });
  card.querySelectorAll('[data-hero]').forEach(function(b){
    b.onclick=function(){
      var pid=b.getAttribute('data-hero');
      var posEl=card.querySelector('.m-pos'); var pos=posEl?posEl.value:'centre';
      var old=b.textContent; b.disabled=true; b.textContent='…';
      mSetStatus(card,mState.autoGallery?'Héros + galerie en cours…':'Recadrage + upload du héros…');
      mApplyHero(slug,pid,pos)
        .then(function(){mRerenderCard(slug);})
        .catch(function(e){toast('Erreur héros : '+e.message);b.disabled=false;b.textContent=old;mSetStatus(card,'');});
    };
  });
  card.querySelectorAll('[data-gal]').forEach(function(c){
    c.onchange=function(){
      var pid=c.getAttribute('data-gal');
      mState.sel[slug][pid]=c.checked;
      var it=c.closest('.mit'); if(it)it.classList.toggle('galon',c.checked);
      mUpdateGalBtns(card,slug);
    };
  });
  card.querySelectorAll('[data-galmode]').forEach(function(b){
    b.onclick=function(){
      var mode=b.getAttribute('data-galmode');
      var bag=mState.sel[slug]||{};
      var ids=Object.keys(bag).filter(function(k){return bag[k];});
      if(!ids.length)return;
      card.querySelectorAll('[data-galmode]').forEach(function(x){x.disabled=true;});
      mSetStatus(card,'Recadrage + upload de '+ids.length+' image(s)…');
      api('/admin/api/picker/salon/'+encodeURIComponent(slug)+'/gallery',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_ids:ids,mode:mode})})
        .then(function(r){toast(mode==='append'?('Galerie enrichie : +'+r.added+' photo(s) ✓'):('Galerie remplacée ('+r.count+' image'+(r.count>1?'s':'')+') ✓'));salon.gallery_custom=r.count;mState.sel[slug]={};mRerenderCard(slug);})
        .catch(function(e){toast('Erreur galerie : '+e.message);mSetStatus(card,'');mUpdateGalBtns(card,slug);card.querySelectorAll('[data-galmode]').forEach(function(x){x.disabled=false;});});
    };
  });
  var rb=card.querySelector('[data-reset]');
  if(rb)rb.onclick=function(){
    if(!confirm('Réinitialiser les photos de ce salon ?\n\nLe héros et la galerie repassent aux images du mode démo, et les photos Google appliquées sont retirées.\n\n(Les autres réglages — services, avis, contact — ne changent pas.)'))return;
    rb.disabled=true; rb.textContent='…'; mSetStatus(card,'Retour aux images de démo…');
    api('/admin/api/picker/salon/'+encodeURIComponent(slug)+'/reset-images',{method:'POST'})
      .then(function(r){toast(r.changed?'Photos réinitialisées (mode démo) ✓':'Déjà en mode démo');salon.hero_applied=false;salon.gallery_custom=0;salon._heroPid=null;mState.sel[slug]={};mRerenderCard(slug);})
      .catch(function(e){toast('Erreur : '+e.message);rb.disabled=false;rb.textContent='↺ Réinitialiser';mSetStatus(card,'');});
  };
  mUpdateGalBtns(card,slug);
}

// ============ PLEIN ÉCRAN navigable (flèches + swipe, héros/galerie inline) ============
var fs={open:false, si:0, pi:0};
function fsSalon(){return (mState.salons||[])[fs.si]||null;}
function fsPhoto(){var s=fsSalon();return (s&&s.photos)?s.photos[fs.pi]:null;}
function findByData(root,attr,val){var f=null;root.querySelectorAll('['+attr+']').forEach(function(e){if(e.getAttribute(attr)===val)f=e;});return f;}
function openFs(slug,photoId){
  var si=(mState.salons||[]).findIndex(function(x){return x.slug===slug;});
  if(si<0)return;
  var pl=mState.salons[si].photos||[];
  var pi=pl.findIndex(function(p){return p.photo_id===photoId;});
  fs.si=si; fs.pi=(pi<0?0:pi); fs.open=true;
  document.body.classList.add('fs-lock');
  $('mfs').classList.add('on');
  renderFs();
}
function closeFs(){fs.open=false;$('mfs').classList.remove('on');document.body.classList.remove('fs-lock');}
function renderFs(){
  var s=fsSalon(), p=fsPhoto();
  if(!s||!p){closeFs();return;}
  $('mfs-img').src=p.lg;
  $('mfs-meta').textContent=s.nom+(s.ville?' · '+s.ville:'')+' · photo '+(fs.pi+1)+'/'+s.photos.length;
  var isHero=p.photo_id===s._heroPid;
  var hb=$('mfs-hero');
  hb.textContent=isHero?'✓ Héros':'⭐ Définir héros';
  hb.classList.toggle('done',isHero);
  hb.disabled=false;
  $('mfs-gal-input').checked=!!(mState.sel[s.slug]&&mState.sel[s.slug][p.photo_id]);
  var agf=$('mfs-autogal'); if(agf)agf.checked=!!mState.autoGallery;
  if(s.photos.length>1){
    [(fs.pi+1)%s.photos.length,(fs.pi-1+s.photos.length)%s.photos.length].forEach(function(i){var im=new Image();im.src=s.photos[i].lg;});
  }
}
function fsPhotoStep(d){
  var s=fsSalon();if(!s||!s.photos.length)return;
  var n=s.photos.length; fs.pi=((fs.pi+d)%n+n)%n; renderFs();
}
function fsSalonStep(d){
  var len=(mState.salons||[]).length; if(!len)return;
  if(d>0){
    if(fs.si<len-1){fs.si++;fs.pi=0;renderFs();}
    else if(mState.salons.length<mState.total){
      mState.offset+=M_LIMIT;
      loadManualSalons().then(function(){fs.si=Math.min(fs.si+1,mState.salons.length-1);fs.pi=0;renderFs();});
    } else {fs.si=0;fs.pi=0;renderFs();}
  } else {
    fs.si=(fs.si>0)?fs.si-1:len-1; fs.pi=0; renderFs();
  }
}
function fsApplyHero(){
  var s=fsSalon(), p=fsPhoto(); if(!s||!p)return;
  var pos='centre', card=mCardNode(s.slug);
  if(card){var psel=card.querySelector('.m-pos'); if(psel)pos=psel.value;}
  var hb=$('mfs-hero'); hb.disabled=true; hb.textContent='…';
  mApplyHero(s.slug,p.photo_id,pos)
    .then(function(){mRerenderCard(s.slug);renderFs();})
    .catch(function(e){toast('Erreur héros : '+e.message);renderFs();});
}
function fsToggleGal(checked){
  var s=fsSalon(), p=fsPhoto(); if(!s||!p)return;
  if(!mState.sel[s.slug])mState.sel[s.slug]={};
  mState.sel[s.slug][p.photo_id]=checked;
  var card=mCardNode(s.slug);
  if(card){
    var box=findByData(card,'data-gal',p.photo_id);
    if(box){box.checked=checked;var it=box.closest('.mit');if(it)it.classList.toggle('galon',checked);}
    mUpdateGalBtns(card,s.slug);
  }
}
$('mfs-close').onclick=closeFs;
$('mfs-stage').addEventListener('click',function(e){if(e.target===this)closeFs();});
$('mfs-nav-left').onclick=function(){fsPhotoStep(-1);};
$('mfs-nav-right').onclick=function(){fsPhotoStep(1);};
$('mfs-nav-up').onclick=function(){fsSalonStep(-1);};
$('mfs-nav-down').onclick=function(){fsSalonStep(1);};
$('mfs-hero').onclick=fsApplyHero;
$('mfs-gal-input').onchange=function(){fsToggleGal(this.checked);};
$('mfs-autogal').onchange=function(){mSetAutoGallery(this.checked);};
document.addEventListener('keydown',function(e){
  if(!fs.open)return;
  if(e.key==='Escape')closeFs();
  else if(e.key==='ArrowRight')fsPhotoStep(1);
  else if(e.key==='ArrowLeft')fsPhotoStep(-1);
  else if(e.key==='ArrowDown')fsSalonStep(1);
  else if(e.key==='ArrowUp')fsSalonStep(-1);
  else return;
  e.preventDefault();
});
(function(){
  var x0=null,y0=null,stage=$('mfs-stage');
  stage.addEventListener('touchstart',function(e){if(e.touches.length!==1){x0=null;return;}x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
  stage.addEventListener('touchend',function(e){
    if(x0==null)return;
    var t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0; x0=y0=null;
    var ax=Math.abs(dx), ay=Math.abs(dy);
    if(Math.max(ax,ay)<40)return;
    if(ax>ay)fsPhotoStep(dx<0?1:-1);
    else fsSalonStep(dy<0?1:-1);
  },{passive:true});
})();

// ============ INIT ============
document.querySelectorAll('.vtab').forEach(function(b){
  b.onclick=function(){
    if(b.classList.contains('active'))return;
    document.querySelectorAll('.vtab').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    view=b.getAttribute('data-v');
    if(view==='manual')renderManual();
    else if(stats)renderShell();
    else refreshAll().catch(function(){});
  };
});
refreshAll().catch(function(e){
  if(e.message==='auth')authMsg();
  else $('content').innerHTML='<div class="msg">Erreur de chargement : '+esc(e.message)+'</div>';
});
})();
</script>
